<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --green-text: #2fbc4b; 
            --red-text: #ff453a; 
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: #000000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* SCHERMATA ORIGINALE IPHONE AD ALTA DEFINIZIONE COME SFONDO */
        .iphone-screen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('sfondo.png'); /* Chiama la tua foto intera */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
        }
        
        /* RETTANGOLO NERO COPRI-NUMERI ORIGINALI */
        .black-mask {
            position: absolute;
            top: 110px; /* Regola questa altezza per coprire i vecchi numeri della foto se necessario */
            width: 100%;
            height: 115px;
            background-color: #000000;
            z-index: 2;
        }

        /* NUOVO TIMER VERO POSIZIONATO SOPRA LA MASCHERA NERA */
        .display-container {
            width: 100%;
            height: 110px;
            position: absolute;
            top: 110px; /* Allineato alla maschera */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }
        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            color: #ffffff;
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        /* PULSANTI TRASPARENTI ATTIVI POSIZIONATI SOPRA QUELLI DELLA FOTO */
        .controls-wrapper {
            position: absolute;
            top: 295px; /* Posizione millimetrica sopra i cerchi dello screenshot */
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 342px;
            height: 82px;
            z-index: 4;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: transparent; /* Invisibili perché usano la grafica della foto sotto */
        }
        .btn-start { color: var(--green-text); font-weight: 500; }
        .btn-stop { color: var(--red-text); font-weight: 500; font-size: 15px; } 
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: #545456; }

        /* AREA DEI GIRI REALI */
        .laps-container { 
            position: absolute;
            top: 400px;
            bottom: 120px;
            width: 100%; 
            max-width: 330px; 
            overflow-y: auto; 
            z-index: 3;
        }
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            height: 45px;
            color: white;
        }

        /* MENU SEGRETO IN PRIMO PIANO */
        #secret-menu { 
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #1c1c1e; 
            border: 1px solid #3a3a3c; 
            border-radius: 14px; 
            padding: 20px; 
            width: 280px; 
            z-index: 99999; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        #secret-menu h3 { color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <!-- IMMAGINE DI SFONDO REALE AL 100% -->
    <div class="iphone-screen-bg"></div>
    
    <!-- COPERTURA DEI NUMERI DELLA FOTO -->
    <div class="black-mask"></div>

    <!-- CRONOMETRO VERO IN FUNZIONE -->
    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <!-- TASTI ATTIVI INVISIBILI -->
    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer"></div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        // Blocca i gesti di zoom nativi e l'effetto elastico di Safari
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });

        // Swipe segreto a due dita verso il basso
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        });

        btnLeft.addEventListener('click', () => {
            if (isRunning) {
                // Sviluppo Giro
            } else {
                resetTimer();
            }
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }

            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            let m1 = Math.floor(minutes / 10);
            let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10);
            let s2 = seconds % 10;

            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;

            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent;
            let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10);
                let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestCent = c;
                    }
                }
            }

            if (minDiff === 999) return currentMs;

            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
