<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
            --tab-inactive: #ffffff;
            --dock-bg: #161617;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 24px 0px 24px; 
            overflow: hidden; 
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(115px + env(safe-area-inset-top));
            margin-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            height: 82px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { background-color: var(--red-btn); color: var(--red-text); } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 330px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 120px; 
        }
        .lap-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
        }
        .lap-row.visible { opacity: 1; }

        /* STRUTTURA DOCK FLOTTANTE IDENTICA AL 100% ALLA FOTO */
        .tab-bar-container {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 12px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 395px;
            height: 68px;
            background-color: var(--dock-bg);
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 4px;
            border: 0.5px solid #242426;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tab-inactive);
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 500;
            width: 23%;
            height: 100%;
        }
        .tab-item.active {
            color: var(--tab-active);
            background-color: #2a2a2b;
            height: 54px;
            width: 26%;
            border-radius: 27px;
        }
        .tab-icon-svg {
            width: 25px;
            height: 25px;
            margin-bottom: 2px;
        }

        #secret-menu { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background-color: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 14px; padding: 20px; width: 280px; z-index: 99999; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #secret-menu h3 { font-family: -apple-system, sans-serif; color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <span class="lap-time" id="live-lap-time">00:00,00</span>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali: Mappamondo a griglia geometrica piena della foto -->
            <div class="tab-item">
                <svg class="tab-icon-svg" viewBox="0 0 30 30" fill="currentColor">
                    <path d="M15 3C8.37 3 3 8.37 3 15s5.37 12 12 12 12-5.37 12-12S21.63 3 15 3zm6.8 6h-2.92c-.32-1.35-.77-2.61-1.33-3.73 1.77.72 3.26 2.01 4.25 3.73zM15 5.08c.59 1.15 1.06 2.47 1.37 3.92h-2.74c.31-1.45.78-2.77 1.37-3.92zm-2.55 1.19c-.56 1.12-1.01 2.38-1.33 3.73H8.2c.99-1.72 2.48-3.01 4.25-3.73zM7.14 11h3.11c-.1.65-.16 1.32-.16 2s.06 1.35.16 2H7.14c-.1-.65-.14-1.32-.14-2s.04-1.35.14-2zm3.95 6h7.82c-.1.64-.17 1.31-.17 2s.07 1.36.17 2h-7.82c-.1-.64-.17-1.31-.17-2s.07-1.36.17-2zm.16-4h7.5c.09-.65.15-1.32.15-2s-.06-1.35-.15-2h-7.5c-.09.65-.15 1.32-.15 2s.06 1.35.15 2zm2.2 8.65c-.59-1.15-1.06-2.47-1.37-3.92h2.74c-.31 1.45-.78 2.77-1.37 3.92zm-3.25-.92c.56-1.12 1.01-2.38 1.33-3.73h2.92c-.99 1.72-2.48 3.01-4.25 3.73zm6.1 0c.56-1.12 1.01-2.38 1.33-3.73h2.92c-.99 1.72-2.48 3.01-4.25 3.73zm3.76-4.73h3.11c.1-.65.14-1.32.14-2s-.04-1.35-.14-2h-3.11c.1.65.16 1.32.16 2s-.06 1.35-.16 2z"/>
                </svg>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie: Struttura bombata piena con lancette alle 4:00 della foto -->
            <div class="tab-item">
                <svg class="tab-icon-svg" viewBox="0 0 30 30" fill="currentColor">
                    <path d="M15 5.5c-5.24 0-9.5 4.26-9.5 9.5s4.26 9.5 9.5 9.5 9.5-4.26 9.5-9.5-4.26-9.5-9.5-9.5zm1.25 10.25l-3.5-2.12v-4.13h1.5v3.25l2.75 1.63-.75 1.25zM25.4 6.44l-3.35-2.81-1.01 1.2 3.35 2.81 1.01-1.2zM4.6 6.44l1.01-1.2 3.35 2.81-1.01 1.2-3.35-2.81zM6.5 24.5l-1.5 1.5 1 1 1.5-1.5-1-1zm17 0l-1 1 1.5 1.5 1-1-1.5-1.5z"/>
                </svg>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro: Cerchio arancione, lancetta nera verticale a ore 12, bottoni in alto della foto -->
            <div class="tab-item active">
                <svg class="tab-icon-svg" viewBox="0 0 30 30">
                    <circle cx="15" cy="16" r="8.5" fill="#ff9f0a"/>
                    <path d="M16 7.5V4.5h-2v3h2zm5 .2l1.2-1.2-1.4-1.4-1.2 1.2 1.4 1.4z" fill="#ff9f0a"/>
                    <line x1="15" y1="16" x2="15" y2="10" stroke="#161617" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="15" cy="16" r="1.2" fill="#161617"/>
                </svg>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer: Cerchio bianco lineare con lancette a ore 10:10 della foto -->
            <div class="tab-item">
                <svg class="tab-icon-svg" viewBox="0 0 30 30" fill="none" stroke="#ffffff" stroke-width="1.8">
                    <circle cx="15" cy="15" r="8.5"></circle>
                    <path d="M15 15l-3.5-3.5M15 15h5" stroke-linecap="round"/>
                </svg>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Impostazione Forza</h3>
        <input type="number" id="target-number" placeholder="Es. 17" min="1" max="54">
        <br>
        <button id="save-target">Salva</button>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
        const display = document.getElementById('display'), btnLeft = document.getElementById('btnLeft'), btnRight = document.getElementById('btnRight'), secretMenu = document.getElementById('secret-menu'), targetInput = document.getElementById('target-number'), saveBtn = document.getElementById('save-target'), placeholderLap = document.getElementById('lap-row-placeholder'), liveLapTime = document.getElementById('live-lap-time'), gestureZone = document.getElementById('gestureZone');
        
        let targetSum = localStorage.getItem('magicTarget') ? parseInt(localStorage.getItem('magicTarget')) : null;
        if(targetSum) targetInput.value = targetSum;

        function formatTime(m, s, c) { return `${m<10?'0'+m:m}:${s<10?'0'+s:s},${c<10?'0'+c:c}`; }

        function runTimer() { 
            elapsedTime = Date.now() - startTime; 
            let tc = Math.floor(elapsedTime / 10); 
            let m = Math.floor(tc/6000), s = Math.floor(tc/100)%60, c = tc%100;
            display.textContent = formatTime(m, s, c);
            if(liveLapTime) liveLapTime.textContent = formatTime(m, s, c);
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) { 
                startTime = Date.now() - elapsedTime; 
                timerInterval = setInterval(runTimer, 10); 
                isRunning = true; 
                btnRight.textContent = 'Interrompi'; 
                btnRight.className = 'btn btn-stop'; 
                btnLeft.textContent = 'Giro'; 
                btnLeft.className = 'btn btn-lap';
                placeholderLap.classList.add('visible');
            } else { 
                clearInterval(timerInterval); 
                isRunning = false; 
                btnRight.textContent = 'Avvia'; 
                btnRight.className = 'btn btn-start'; 
                btnLeft.textContent = 'Azzera'; 
                if (targetSum !== null) forzareRisultato();
            }
        });

        btnLeft.addEventListener('click', () => { 
            if (!isRunning && btnLeft.textContent === 'Azzera') { 
                elapsedTime = 0; 
                display.textContent = "00:00,00"; 
                if(liveLapTime) liveLapTime.textContent = "00:00,00";
                btnLeft.className = 'btn btn-lap disabled'; 
                placeholderLap.classList.remove('visible'); 
            } 
        });

        function forzareRisultato() {
            let tc = Math.floor(elapsedTime / 10), rs = Math.floor(tc / 100) % 60, rm = Math.floor(tc / 6000);
            let mStr = rm < 10 ? '0' + rm : rm.toString(), sStr = rs < 10 ? '0' + rs : rs.toString();
            let sParziale = mStr.split('').concat(sStr.split('')).reduce((sum, d) => sum + parseInt(d), 0);
            let diff = targetSum - sParziale, forcedC = tc % 100, migliorD = 999;
            for (let c1 = 0; c1 <= 9; c1++) { for (let c2 = 0; c2 <= 9; c2++) { if (c1 + c2 === diff) { let vCent = c1 * 10 + c2; let dist = Math.abs(vCent - (tc % 100)); if (dist < migliorD) { migliorD = dist; forcedC = vCent; } } } }
            let tForzato = formatTime(rm, rs, forcedC);
            display.textContent = tForzato;
            if(liveLapTime) liveLapTime.textContent = tForzato;
        }

        // SWIPE CON DUE DITA BLOCCATO SULLA METÀ SUPERIORE DELLO SCHERMO
        let touchStartY = 0;
        gestureZone.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            } 
        }, {passive: true});

        gestureZone.addEventListener('touchend', (e) => { 
            if (touchStartY !== 0) { 
                let currentY = (e.changedTouches.clientY + (e.changedTouches ? e.changedTouches.clientY : e.changedTouches.clientY)) / 2;
                if (currentY - touchStartY > 45) { 
                    secretMenu.style.display = 'block'; 
                }
                touchStartY = 0; 
            } 
        });

        saveBtn.addEventListener('click', () => { let val = parseInt(targetInput.value); if (val > 0) { targetSum = val; localStorage.setItem('magicTarget', val); secretMenu.style.display = 'none'; } });
    </script>
</body>
</html>
