<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronometro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-text: #aeaeb2;
            --btn-gray-dark: #1c1c1e;
            --btn-gray-dark-text: #8e8e93;
            --btn-gray-light: #333333;
            --btn-gray-light-text: #f2f2f7;
            --btn-gray-disabled: #545456;
            --btn-green: #1c3d1e;
            --btn-green-text: #4cd964;
            --btn-red: #3a1715;
            --btn-red-text: #ff3b30;
            --border-color: #262629;
            --dot-active: #ffffff;
            --dot-inactive: #3a3a3c;
        }

        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            padding-top: 18vh;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .time-display {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            font-size: 88px;
            font-weight: 100;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .controls-wrapper {
            position: relative;
            margin-top: 86px;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            height: 85px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .btn {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            border: none;
            font-size: 17px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            transition: filter 0.1s;
        }

        .btn:active {
            filter: brightness(0.65);
        }

        .btn-lap {
            background-color: var(--btn-gray-dark);
            color: var(--btn-gray-dark-text);
        }
        
        .btn-lap:disabled {
            color: var(--btn-gray-disabled);
        }

        .btn-lap.active-mode {
            background-color: var(--btn-gray-light);
            color: var(--btn-gray-light-text);
        }

        .btn-start {
            background-color: var(--btn-green);
            color: var(--btn-green-text);
        }

        .btn-stop {
            background-color: var(--btn-red);
            color: var(--btn-red-text);
            font-size: 15px; 
        }

        .page-dots {
            display: flex;
            gap: 7px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: var(--dot-inactive);
            transition: background-color 0.2s ease;
        }

        .dot.active {
            background-color: var(--dot-active);
        }

        .laps-container {
            flex: 1;
            overflow-y: auto;
            border-top: 0.5px solid var(--border-color);
            padding: 0 16px;
            margin-bottom: 75px; 
            touch-action: pan-y; 
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            border-bottom: 0.5px solid var(--border-color);
            font-size: 17px;
            font-variant-numeric: tabular-nums;
            font-weight: 400;
        }

        .lap-row.min { color: var(--btn-green-text); }
        .lap-row.max { color: var(--btn-red-text); }
        .lap-label { color: var(--text-color); }
        
        .lap-time { 
            color: var(--text-color); 
            font-weight: 300; 
        }

        /* Posizionamento perfetto a filo sopra la sbarra Home di iOS */
        .bottom-tabs {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom) - 10px);
            left: 0;
            height: 56px; 
            width: 100%; 
            background-image: url('tabs.PNG');
            background-size: 100% 100%; 
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: 10;
        }

        #secret-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            touch-action: auto;
        }

        .menu-content {
            background-color: #1c1c1e;
            padding: 20px;
            border-radius: 14px;
            width: 280px;
            text-align: center;
        }

        .menu-content h3 { margin-bottom: 15px; font-size: 17px; color: #fff; }
        .menu-content input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3a3a3c;
            background-color: #2c2c2e;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        .menu-content button {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app-wrapper">
        <div class="main-content">
            <div class="timer-container">
                <div class="time-display" id="display">00:00,00</div>
            </div>

            <div class="controls-wrapper">
                <div class="controls">
                    <button class="btn btn-lap" id="btn-left" disabled>Giro</button>
                    <button class="btn btn-start" id="btn-right">Avvia</button>
                </div>
                <div class="page-dots">
                    <div class="dot active" id="dot1"></div>
                    <div class="dot" id="dot2"></div>
                </div>
            </div>
        </div>

        <div class="laps-container" id="laps-list"></div>

        <div class="bottom-tabs"></div>
    </div>

    <div id="secret-menu">
        <div class="menu-content">
            <h3>Forzatura Cifre</h3>
            <input type="number" id="force-number" placeholder="Es. 15" min="1" max="99">
            <button id="save-btn">Salva</button>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let dotInterval = null;
        let liveLapInterval = null;
        let isRunning = false;
        let laps = [];
        let totalLapTime = 0;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const lapsList = document.getElementById('laps-list');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('force-number');
        const saveBtn = document.getElementById('save-btn');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');

        let targetSum = localStorage.getItem('magic_force_sum') ? parseInt(localStorage.getItem('magic_force_sum')) : null;
        if(targetSum) forceInput.value = targetSum;

        // SISTEMA DI BLOCCO ORIENTAMENTO ASSOLUTO
        function forcePortrait() {
            if (window.innerHeight < window.innerWidth) {
                document.getElementById('app-wrapper').style.setProperty('transform', 'none', 'important');
                document.getElementById('app-wrapper').style.setProperty('width', '100vw', 'important');
                document.getElementById('app-wrapper').style.setProperty('height', '100vh', 'important');
            }
        }
        window.addEventListener('resize', forcePortrait);
        window.addEventListener('orientationchange', forcePortrait);

        // NUOVO SISTEMA DI RILEVAMENTO GESTURE A 2 DITA INSEPARABILE DA IOS
        let startY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                startY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && startY !== 0) {
                let currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                let swipeDistance = currentY - startY;
                
                if (swipeDistance > 35) {
                    secretMenu.style.display = 'flex';
                    startY = 0;
                }
            }
        }, { passive: true });

        window.addEventListener('touchend', () => { startY = 0; });

        saveBtn.addEventListener('click', () => {
            const val = parseInt(forceInput.value);
            if (!isNaN(val)) {
                targetSum = val;
                localStorage.setItem('magic_force_sum', val);
            } else {
                targetSum = null;
                localStorage.removeItem('magic_force_sum');
            }
            secretMenu.style.display = 'none';
        });

        function formatTime(ms) {
            let min = Math.floor(ms / 60000);
            let sec = Math.floor((ms % 60000) / 1000);
            let cent = Math.floor((ms % 1000) / 10);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')},${cent.toString().padStart(2, '0')}`;
        }

        function getForcedCentiseconds(currentMs, target) {
            let min = Math.floor(currentMs / 60000);
            let sec = Math.floor((currentMs % 60000) / 1000);
            let m1 = Math.floor(min / 10); let m2 = min % 10;
            let s1 = Math.floor(sec / 10); let s2 = sec % 10;
            
            let baseSum = m1 + m2 + s1 + s2;
            let neededSum = target - baseSum;

            for (let c = 0; c < 100; c++) {
                if ((Math.floor(c / 10) + (c % 10)) === neededSum) {
                    return c * 10;
                }
            }
            return null;
        }

        function startDotAnimation() {
            let toggle = true;
            dotInterval = setInterval(() => {
                if (toggle) {
                    dot1.classList.remove('active');
                    dot2.classList.add('active');
                } else {
                    dot2.classList.remove('active');
                    dot1.classList.add('active');
                }
                toggle = !toggle;
            }, 2500);
        }

        function stopDotAnimation() {
            clearInterval(dotInterval);
            dot2.classList.remove('active');
            dot1.classList.add('active');
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now() - elapsedTime;
                
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    display.innerText = formatTime(elapsedTime);
                }, 10);
                
                startDotAnimation();

                btnRight.className = "btn btn-stop";
                btnRight.innerText = "Interrompi";
                
                btnLeft.disabled = false;
                btnLeft.className = "btn btn-lap active-mode";
                btnLeft.innerText = "Giro";

                if (laps.length === 0) {
                    laps.unshift({ number: 1, time: 0 });
                }
                
                renderLaps();
                
                // SISTEMATO: Avvia lo scorrimento stabile e continuo in tempo reale del primo giro
                liveLapInterval = setInterval(() => {
                    if (laps.length > 0 && isRunning) {
                        laps[0].time = elapsedTime - totalLapTime;
                        renderLaps();
                    }
                }, 10);
                
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                clearInterval(liveLapInterval);
                stopDotAnimation();
                elapsedTime = Date.now() - startTime;

                if (targetSum !== null) {
                    let forcedMs = getForcedCentiseconds(elapsedTime, targetSum);
                    if (forcedMs !== null) {
                        let baseTime = Math.floor(elapsedTime / 1000) * 1000;
                        elapsedTime = baseTime + forcedMs;
                    }
                }

                if (laps.length > 0) {
                    laps[0].time = elapsedTime - totalLapTime;
                    renderLaps();
                }

                display.innerText = formatTime(elapsedTime);
                btnRight.className = "btn btn-start";
                btnRight.innerText = "Avvia";
                
                btnLeft.className = "btn btn-lap active-mode";
                btnLeft.innerText = "Azzera";
            }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) {
                clearInterval(liveLapInterval);
                elapsedTime = 0;
                totalLapTime = 0;
                laps = [];
                display.innerText = "00:00,00";
                lapsList.innerHTML = "";
                
                btnLeft.disabled = true;
                btnLeft.className = "btn btn-lap";
                btnLeft.innerText = "Giro";
            } else {
                let currentTotal = elapsedTime;
                let lapTime = currentTotal - totalLapTime;
                totalLapTime = currentTotal;

                laps[0].time = lapTime;
                laps.unshift({ number: laps.length + 1, time: 0 });
                renderLaps();
            }
        });

        function renderLaps() {
            lapsList.innerHTML = "";
            if (laps.length === 0) return;

            let minIndex = -1, maxIndex = -1;
            if (laps.length > 2) {
                let min = Infinity, max = -Infinity;
                let startIndex = isRunning ? 1 : 0;
                for (let i = startIndex; i < laps.length; i++) {
                    if (laps[i].time < min) { min = laps[i].time; minIndex = i; }
                    if (laps[i].time > max) { max = laps[i].time; maxIndex = i; }
                }
            }

            laps.forEach((lap, index) => {
                const row = document.createElement('div');
                row.className = 'lap-row';
                if (index === minIndex && laps.length > 2) row.classList.add('min');
                if (index === maxIndex && laps.length > 2) row.classList.add('max');

                row.innerHTML = `
                    <div class="lap-label">Giro ${lap.number}</div>
                    <div class="lap-time">${formatTime(lap.time)}</div>
                `;
                lapsList.appendChild(row);
            });
        }
    </script>
</body>
</html>
