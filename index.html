<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
            --tab-inactive: #8e8e93;
            --dock-bg: #1c1c1e;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 28px 0px 28px; 
            overflow: hidden; 
        }
        
        .spacer-top {
            flex-grow: 2.3;
        }

        /* Font dei numeri ultra-sottile per riprodurre lo stile esatto della foto */
        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            margin-bottom: 70px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }
        .btn { 
            width: 76px; 
            height: 76px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
        }
        .btn-lap { color: #ebebf599; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { background-color: var(--red-btn); color: var(--red-text); } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 350px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 2;
            margin-bottom: 120px; 
        }
        .lap-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 4px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
        }
        .lap-row .lap-label { color: #ffffff; }
        .lap-row .lap-time { font-variant-numeric: tabular-nums; font-weight: 400; color: #ffffff; }

        /* Struttura del dock inferiore e delle icone riprodotta graficamente dalla foto */
        .tab-bar-container {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 390px;
            height: 64px;
            background-color: var(--dock-bg);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tab-inactive);
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 500;
            width: 23%;
            height: 100%;
        }
        .tab-item.active {
            color: var(--tab-active);
            background-color: #2c2c2e;
            height: 48px;
            border-radius: 24px;
        }
        
        /* Icone geometriche personalizzate per copiare lo stile esatto della foto */
        .icon-geo {
            width: 20px;
            height: 20px;
            margin-bottom: 3px;
            position: relative;
        }
        /* Icona Ore Locali (Globo con linee) */
        .icon-world {
            border: 2px solid currentColor;
            border-radius: 50%;
        }
        .icon-world::before {
            content: '';
            position: absolute;
            top: -2px; left: 5px; width: 6px; height: 20px;
            border-left: 2px solid currentColor;
            border-right: 2px solid currentColor;
            border-radius: 50%;
        }
        /* Icona Sveglia (Cerchio con piedini e campanelle) */
        .icon-alarm {
            border: 2px solid currentColor;
            border-radius: 50%;
            transform: scale(0.9);
        }
        .icon-alarm::before, .icon-alarm::after {
            content: ''; position: absolute; background: currentColor; width: 4px; height: 2px;
        }
        .icon-alarm::before { top: -3px; left: 1px; transform: rotate(-45deg); }
        .icon-alarm::after { top: -3px; right: 1px; transform: rotate(45deg); }
        /* Icona Cronometro (Orologio con pulsante in alto) */
        .icon-stopwatch {
            border: 2px solid currentColor;
            border-radius: 50%;
        }
        .icon-stopwatch::before {
            content: ''; position: absolute; top: -4px; left: 7px; width: 2px; height: 3px; background: currentColor;
        }
        .icon-stopwatch::after {
            content: ''; position: absolute; top: 3px; left: 7px; width: 2px; height: 6px; background: currentColor; transform-origin: bottom center; transform: rotate(30deg);
        }
        /* Icona Timer (Cerchio freccia circolare) */
        .icon-timer {
            border: 2px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
        }
        .icon-timer::before {
            content: ''; position: absolute; top: -1px; right: -2px; width: 0; height: 0; border-style: solid; border-width: 3px 0 3px 5px; border-color: transparent transparent transparent currentColor; transform: rotate(-20deg);
        }

        #secret-menu { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background-color: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 14px; padding: 20px; width: 280px; z-index: 99999; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="spacer-top"></div>

    <div class="timer-display" id="display">00:00,00</div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer"></div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <div class="tab-item">
                <div class="icon-geo icon-world"></div>
                <span>Ore locali</span>
            </div>
            <div class="tab-item">
                <div class="icon-geo icon-alarm"></div>
                <span>Sveglie</span>
            </div>
            <div class="tab-item active">
                <div class="icon-geo icon-stopwatch"></div>
                <span>Cronometro</span>
            </div>
            <div class="tab-item">
                <div class="icon-geo icon-timer"></div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3 style="margin-bottom:15px; font-family:-apple-system, sans-serif; font-size:17px;">Impostazione Forza</h3>
        <input type="number" id="target-number" placeholder="Es. 17" min="1" max="54">
        <br>
        <button id="save-target">Salva</button>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
        const display = document.getElementById('display'), btnLeft = document.getElementById('btnLeft'), btnRight = document.getElementById('btnRight'), secretMenu = document.getElementById('secret-menu'), targetInput = document.getElementById('target-number'), saveBtn = document.getElementById('save-target'), lapsContainer = document.getElementById('lapsContainer');
        
        let targetSum = localStorage.getItem('magicTarget') ? parseInt(localStorage.getItem('magicTarget')) : null;
        if(targetSum) targetInput.value = targetSum;

        function formatTime(m, s, c) { return `${m<10?'0'+m:m}:${s<10?'0'+s:s},${c<10?'0'+c:c}`; }

        function runTimer() { 
            elapsedTime = Date.now() - startTime; 
            let tc = Math.floor(elapsedTime / 10); 
            let m = Math.floor(tc/6000), s = Math.floor(tc/100)%60, c = tc%100;
            display.textContent = formatTime(m, s, c);
            const liveLapTime = document.getElementById('live-lap-time');
            if(liveLapTime) liveLapTime.textContent = formatTime(m, s, c);
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) { 
                startTime = Date.now() - elapsedTime; 
                timerInterval = setInterval(runTimer, 10); 
                isRunning = true; 
                btnRight.textContent = 'Interrompi'; 
                btnRight.className = 'btn btn-stop'; 
                btnLeft.textContent = 'Giro'; 
                btnLeft.className = 'btn btn-lap';
                lapsContainer.innerHTML = `
                    <div class="lap-row" id="lap-1-row">
                        <span class="lap-label">Giro 1</span>
                        <span class="lap-time" id="live-lap-time">00:00,00</span>
                    </div>`;
            } else { 
                clearInterval(timerInterval); 
                isRunning = false; 
                btnRight.textContent = 'Avvia'; 
                btnRight.className = 'btn btn-start'; 
                btnLeft.textContent = 'Azzera'; 
                if (targetSum !== null) forzareRisultato();
            }
        });

        btnLeft.addEventListener('click', () => { 
            if (!isRunning && btnLeft.textContent === 'Azzera') { 
                elapsedTime = 0; 
                display.textContent = "00:00,00"; 
                btnLeft.className = 'btn btn-lap disabled'; 
                lapsContainer.innerHTML = ''; 
            } 
        });

        function forzareRisultato() {
            let tc = Math.floor(elapsedTime / 10), rs = Math.floor(tc / 100) % 60, rm = Math.floor(tc / 6000);
            let mStr = rm < 10 ? '0' + rm : rm.toString(), sStr = rs < 10 ? '0' + rs : rs.toString();
            let sParziale = mStr.split('').concat(sStr.split('')).reduce((sum, d) => sum + parseInt(d), 0);
            let diff = targetSum - sParziale, forcedC = tc % 100, migliorD = 999;
            for (let c1 = 0; c1 <= 9; c1++) { for (let c2 = 0; c2 <= 9; c2++) { if (c1 + c2 === diff) { let vCent = c1 * 10 + c2; let dist = Math.abs(vCent - (tc % 100)); if (dist < migliorD) { migliorD = dist; forcedC = vCent; } } } }
            let tForzato = formatTime(rm, rs, forcedC);
            display.textContent = tForzato;
            const liveLapTime = document.getElementById('live-lap-time');
            if(liveLapTime) liveLapTime.textContent = tForzato;
        }

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => { if (e.touches.length === 2) touchStartY = (e.touches.clientY + e.touches.clientY) / 2; }, {passive: true});
        window.addEventListener('touchend', (e) => { if (touchStartY !== 0) { let touchEndY = (e.changedTouches.clientY + (e.changedTouches ? e.changedTouches.clientY : e.changedTouches.clientY)) / 2; if (touchEndY - touchStartY > 70) secretMenu.style.display = 'block'; touchStartY = 0; } });
        saveBtn.addEventListener('click', () => { let val = parseInt(targetInput.value); if (val > 0) { targetSum = val; localStorage.setItem('magicTarget', val); secretMenu.style.display = 'none'; } });
    </script>
</body>
</html>
