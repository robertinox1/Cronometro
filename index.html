<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ffb948; 
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(125px + env(safe-area-inset-top));
            margin-bottom: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 90px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 345px;
            height: 82px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 335px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 136px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .tab-item .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 38px;
            margin-bottom: 0px;
        }
        .lap-block-cent { width: 22px; text-align: left; }

        .tab-bar-container {
            position: fixed;
            bottom: 34px; 
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 366px;
            height: 60px; 
            background-color: #1a1a1c; 
            border-radius: 30px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            border: 0.8px solid rgba(255, 255, 255, 0.15); 
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 400;
            width: 24%;
            height: 100%;
            position: relative;
        }
        .tab-item span {
            color: #ffffff; 
            margin-top: -1px; 
            letter-spacing: -0.1px;
        }
        .tab-item .tab-svg { 
            width: 38px; 
            height: 38px; 
        }

        .tab-item.active {
            background-color: #4a4a4c; 
            border-radius: 26px; 
            height: calc(100% - 8px); 
            margin: 4px 0; 
            width: 32.5%; 
        }
        .tab-item.active .icon-wrapper {
            background-color: transparent;
        }
        .tab-item.active span { 
            color: var(--tab-active); 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali: Replica esatta dello screenshot -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(0.95);">
                        <circle cx="18" cy="18" r="11" stroke="#ffffff" stroke-width="1.6"/> 
                        <path d="M7 18H29" stroke="#ffffff" stroke-width="1.6"/> 
                        <path d="M18 7V29" stroke="#ffffff" stroke-width="1.6"/>
                        <path d="M18 7C21.2 10.2 22.5 14 22.5 18C22.5 22 21.2 25.8 18 29M18 7C14.8 10.2 13.5 14 13.5 18C13.5 22 14.8 25.8 18 29" stroke="#ffffff" stroke-width="1.6"/>
                        <path d="M9.8 11.8C12.4 13.2 15.1 13.6 18 13.6C20.9 13.6 23.6 13.2 26.2 11.8" stroke="#ffffff" stroke-width="1.6"/> 
                        <path d="M9.8 24.2C12.4 22.8 15.1 22.4 18 22.4C20.9 22.4 23.6 22.8 26.2 24.2" stroke="#ffffff" stroke-width="1.6"/> 
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie: Corrispondenza al 100% con l'immagine inviata -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(1.18);"> 
                        <!-- Singola forma solida per cassa e piedi a ore 4 e ore 8 corti e larghi -->
                        <path d="M18,9.8 C13.4,9.8 9.7,13.5 9.7,18.1 C9.7,21.3 11.5,24.1 14.2,25.4 L12.5,27.6 C12.2,28.0 12.7,28.6 13.3,28.3 L15.6,26.5 C16.4,26.7 17.2,26.8 18,26.8 C18.8,26.8 19.6,26.7 20.4,26.5 L22.7,28.3 C23.3,28.6 23.8,28.0 23.5,27.6 L21.8,25.4 C24.6,24.1 26.3,21.3 26.3,18.1 C26.3,13.5 22.6,9.8 18,9.8 Z" fill="#ffffff"/>
                        
                        <!-- Lancette sottili dentro il quadrante (ore 9 in punto) -->
                        <path d="M18,18.1 H14.8" stroke="#1a1a1c" stroke-width="1.2" stroke-linecap="round"/> 
                        <path d="M18,18.1 V13.6" stroke="#1a1a1c" stroke-width="1.2" stroke-linecap="round"/> 
                        
                        <!-- Allarmi orecchiette: Semicerchi netti indipendenti staccati a ore 10:30 e ore 1:30 -->
                        <path d="M14.6,9.5 C14.4,7.1 11.6,6.4 10.1,8.2 C8.8,9.8 9.4,11.6 11.5,11.6 Z" fill="#ffffff"/>
                        <path d="M21.4,9.5 C21.6,7.1 24.4,6.4 25.9,8.2 C27.2,9.8 26.6,11.6 24.5,11.6 Z" fill="#ffffff"/>
                    </svg>
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro (Attivo): Spessori marcati, pallino centrale micro e tasto a ore 2 molto a destra -->
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(1.22);"> 
                        <circle cx="18" cy="19.5" r="8.5" fill="var(--tab-active)" stroke="var(--tab-active)" stroke-width="1.6"/> 
                        <circle cx="18" cy="19.5" r="1.0" fill="black"/> <!-- Pallino centrale micro dell'immagine -->
                        <path d="M18 18.4V14.2" stroke="black" stroke-width="1.6" stroke-linecap="round"/> <!-- Spessore corretto -->
                        <rect x="17.2" y="9.2" width="1.6" height="1.6" rx="0.3" fill="var(--tab-active)"/> 
                        <!-- Tasto destro spostato molto a destra sul perimetro -->
                        <rect x="24.7" y="11.2" width="1.6" height="1.6" rx="0.3" transform="rotate(52 24.7 11.2)" fill="var(--tab-active)"/> 
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer: Arco interrotto a 90° e freccia conica con innesto perfetto -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(1.05);">
                        <path d="M18 9.5 A 8.5 8.5 0 1 1 9.5 18" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                        <path d="M18 9.5V13" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
                        <g transform="translate(18, 18) rotate(-90)">
                            <circle cx="0" cy="0" r="1.6" fill="#ffffff"/>
                            <polygon points="-1.3,0 1.3,0 0.4,-6.6 -0.4,-6.6" fill="#ffffff"/>
                        </g>
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        btnRight.addEventListener('click', () => {
            if (!isRunning) { startTimer(); } else { stopTimer(); }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) resetTimer();
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);
            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }
            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalCent = Math.floor(currentMs / 10);
            let s = Math.floor(totalCent / 100) % 60;
            let m = Math.floor(totalCent / 6000);
            let m1 = Math.floor(m / 10); let m2 = m % 10;
            let s1 = Math.floor(s / 10); let s2 = s % 10;
            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;
            let currentCent = totalCent % 100;
            let bestCent = currentCent; let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10); let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) { minDiff = diff; bestCent = c; }
                }
            }
            if (minDiff === 999) return currentMs;
            return (Math.floor(totalCent / 100) * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
