<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(125px + env(safe-area-inset-top));
            margin-bottom: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 90px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 345px;
            height: 82px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 335px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 136px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .lap-block-cent { width: 22px; text-align: left; }

        /* TAB BAR SOTTILE - CORRETTA SULLA GEOMETRIA DI SISTEMA CON RAGGIO 32PX */
        .tab-bar-container {
            position: fixed;
            bottom: 34px; 
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 366px;
            height: 64px; /* Barra resa più sottile rispetto ai precedenti 84px */
            background-color: #121213;
            border-radius: 32px; /* Angolo di curvatura della barra principale */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            border: 0.5px solid #222224;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10.5px;
            font-weight: 400;
            width: 24%;
            height: 100%;
        }
        .tab-item span {
            color: #ffffff; 
            margin-top: 1px;
            letter-spacing: -0.1px;
        }
        .tab-item .tab-svg { 
            width: 34px; /* Icone rese globalmente più grandi */
            height: 34px; 
        }
        .tab-item .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 82px;
            height: 40px;
            border-radius: 20px;
        }

        /* BOLLA ATTIVA CON ANGOLO TONDEGGIANTE COERENTE ALLA BARRA PRINCIPALE (32PX CALIBRATI SU SCALA) */
        .tab-item.active {
            background-color: #242426;
            border-radius: 32px; /* Stesso angolo di curvatura dei lati della barra delle icone */
            height: calc(100% - 6px);
        }
        .tab-item.active .icon-wrapper {
            background-color: transparent;
        }
        .tab-item.active span { 
            color: var(--tab-active); 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali: Linee spesse, più grande, equatore dritto, curva 1 concava in alto, curva 3 concava in basso -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 34 34" fill="none" xmlns="w3.org">
                        <circle cx="17" cy="17" r="11.5" stroke="#ffffff" stroke-width="1.8"/> <!-- Linea esterna più spessa -->
                        <path d="M5 17H29" stroke="#ffffff" stroke-width="1.8"/> <!-- Equatore dritto spesso -->
                        <path d="M17 5V29" stroke="#ffffff" stroke-width="1.2"/>
                        <!-- 2 curve verticali -->
                        <path d="M17 5.5C20.5 9 22 13 22 17C22 21 20.5 25 17 28.5M17 5.5C13.5 9 12 13 12 17C12 21 13.5 25 17 28.5" stroke="#ffffff" stroke-width="1.5"/>
                        <!-- Prima linea orizzontale: curva con concavità verso l'alto -->
                        <path d="M7.5 11.5C10.5 13 13.5 13.5 17 13.5C20.5 13.5 23.5 13 26.5 11.5" stroke="#ffffff" stroke-width="1.5"/>
                        <!-- Terza linea orizzontale: curva con concavità verso il basso -->
                        <path d="M7.5 22.5C10.5 21 13.5 20.5 17 20.5C20.5 20.5 23.5 21 26.5 22.5" stroke="#ffffff" stroke-width="1.5"/>
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie: Più grande, riempita tutta di bianco tranne le lancette scure -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 34 34" fill="none" xmlns="w3.org">
                        <!-- Corpo sveglia riempito interamente di bianco solido -->
                        <circle cx="17" cy="18" r="8.5" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
                        <!-- Lancette vuote nere scavate nel bianco per segnare le 9:00 -->
                        <path d="M17 18H12.5M17 18V13.5" stroke="#121213" stroke-width="1.6" stroke-linecap="round"/> 
                        <!-- Campanelli dx/sx riempiti -->
                        <path d="M7.5 9.5C6.7 10.3 6.7 11.7 7.5 12.5L10.5 9.5C9.7 8.7 8.3 8.7 7.5 9.5ZM26.5 9.5C27.3 10.3 27.3 11.7 26.5 12.5L23.5 9.5C24.3 8.7 25.7 8.7 26.5 9.5Z" fill="#ffffff"/>
                        <!-- Piedini dx/sx solidi -->
                        <rect x="9.5" y="25" width="1.8" height="3.5" rx="0.5" transform="rotate(22 9.5 25)" fill="#ffffff"/>
                        <rect x="22.5" y="24.3" width="1.8" height="3.5" rx="0.5" transform="rotate(-22 22.5 24.3)" fill="#ffffff"/>
                    </svg>
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro (Attivo): Più grande, senza tastino sinistro, lancetta da cerchio centrale -->
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 34 34" fill="none" xmlns="w3.org">
                        <circle cx="17" cy="18.5" r="9" fill="#ff9f0a"/>
                        <!-- Piccolo cerchio centrale nero da cui si dirama la lancetta -->
                        <circle cx="17" cy="18.5" r="1.6" fill="black"/>
                        <!-- Lancetta scura orientata a ore 12 che parte dal cerchio centrale -->
                        <path d="M17 17V12.5" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Tasto centrale a ore 12 -->
                        <rect x="15.7" y="5" width="2.6" height="2.8" rx="0.4" fill="#ff9f0a"/> 
                        <!-- Tasto laterale destro a ore 2 (levato quello di sinistra a ore 10) -->
                        <rect x="22.8" y="8.5" width="1.6" height="2.8" rx="0.4" transform="rotate(40 22.8 8.5)" fill="#ff9f0a"/> 
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer: Cerchio completo spezzato tra 11 e 12, lancetta conica a ore 11, linetta a ore 12 verso il centro -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 34 34" fill="none" xmlns="w3.org">
                        <!-- Cerchio completo interrotto esclusivamente nel varco tra ore 11 e ore 12 -->
                        <path d="M14.2 8C14.8 7.8 15.4 7.7 16 7.7C21.2 7.7 25.5 12 25.5 17.2C25.5 22.4 21.2 26.7 16 26.7C10.8 26.7 6.5 22.4 6.5 17.2C6.5 12.5 10 8.5 14.5 7.8" stroke="#ffffff" stroke-width="1.5"/>
                        
                        <!-- Piccola linetta a ore 12 che scende verticalmente verso il centro per pochi pixel -->
                        <path d="M16 7.7V10.7" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
                        
                        <!-- Lancetta che parte più doppia dal centro e si restringe man mano che punta verso le ore 11 -->
                        <path d="M16 17.2L12.2 10.2" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/> <!-- Base strutturale geometrica -->
                        <polygon points="15.5,16.8 16.5,17.4 12.4,9.9 12.0,10.3" fill="#ffffff"/> <!-- Profilo conico rastremato verso l'alto -->
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) { startTimer(); } else { stopTimer(); }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) resetTimer();
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);
            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }
            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(currentMs / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            let m1 = Math.floor(minutes / 10); let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10); let s2 = seconds % 10;
            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;
            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent; let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10); let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) { minDiff = diff; bestCent = c; }
                }
            }
            if (minDiff === 999) return currentMs;
            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
