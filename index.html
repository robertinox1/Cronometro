<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { --bg-color: #000000; --text-color: #ffffff; --gray-btn: #333333; --gray-text: #ebebf599; --green-btn: #1c3d1e; --green-text: #54d664; --red-btn: #3a1715; --red-text: #ff453a; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 60px 20px 40px 20px; overflow: hidden; }
        .timer-display { font-size: 82px; font-weight: 200; font-variant-numeric: tabular-nums; margin-top: 40px; letter-spacing: -1px; width: 100%; text-align: center; }
        .controls { display: flex; justify-content: space-between; width: 100%; max-width: 340px; margin-bottom: auto; margin-top: 60px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; }
        .btn:active { filter: brightness(1.3); }
        .btn-lap { background-color: var(--gray-btn); color: var(--text-color); }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { background-color: var(--red-btn); color: var(--red-text); }
        .laps-container { width: 100%; max-width: 340px; height: 200px; border-top: 0.5px solid #222; overflow-y: auto; margin-bottom: 20px; }
        #secret-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 14px; padding: 20px; width: 280px; z-index: 9999; text-align: center; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="timer-display" id="display">00:00,00</div>
    <div class="controls">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>
    <div class="laps-container"></div>
    <div id="secret-menu">
        <h3 style="margin-bottom:15px;">Impostazione Forza</h3>
        <input type="number" id="target-number" placeholder="Es. 17" min="1" max="54">
        <br>
        <button id="save-target">Salva</button>
    </div>
    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
        const display = document.getElementById('display'), btnLeft = document.getElementById('btnLeft'), btnRight = document.getElementById('btnRight'), secretMenu = document.getElementById('secret-menu'), targetInput = document.getElementById('target-number'), saveBtn = document.getElementById('save-target');
        let targetSum = localStorage.getItem('magicTarget') ? parseInt(localStorage.getItem('magicTarget')) : null;
        if(targetSum) targetInput.value = targetSum;
        function updateDisplay(m, s, c) { display.textContent = `${m<10?'0'+m:m}:${s<10?'0'+s:s},${c<10?'0'+c:c}`; }
        function runTimer() { elapsedTime = Date.now() - startTime; let tc = Math.floor(elapsedTime / 10); updateDisplay(Math.floor(tc/6000), Math.floor(tc/100)%60, tc%100); }
        btnRight.addEventListener('click', () => {
            if (!isRunning) { startTime = Date.now() - elapsedTime; timerInterval = setInterval(runTimer, 10); isRunning = true; btnRight.textContent = 'Interrompi'; btnRight.className = 'btn btn-stop'; btnLeft.textContent = 'Giro'; btnLeft.className = 'btn btn-lap'; }
            else { clearInterval(timerInterval); isRunning = false; btnRight.textContent = 'Avvia'; btnRight.className = 'btn btn-start'; btnLeft.textContent = 'Azzera'; if (targetSum !== null) forzareRisultato(); }
        });
        btnLeft.addEventListener('click', () => { if (!isRunning && btnLeft.textContent === 'Azzera') { elapsedTime = 0; display.textContent = "00:00,00"; btnLeft.className = 'btn btn-lap disabled'; } });
        function forzareRisultato() {
            let tc = Math.floor(elapsedTime / 10), rs = Math.floor(tc / 100) % 60, rm = Math.floor(tc / 6000);
            let mStr = rm < 10 ? '0' + rm : rm.toString(), sStr = rs < 10 ? '0' + rs : rs.toString();
            let sParziale = mStr.split('').concat(sStr.split('')).reduce((sum, d) => sum + parseInt(d), 0);
            let diff = targetSum - sParziale, forcedC = tc % 100, migliorD = 999, trovato = false;
            for (let c1 = 0; c1 <= 9; c1++) { for (let c2 = 0; c2 <= 9; c2++) { if (c1 + c2 === diff) { let vCent = c1 * 10 + c2; let dist = Math.abs(vCent - (tc % 100)); if (dist < migliorD) { migliorD = dist; forcedC = vCent; trovato = true; } } } }
            updateDisplay(rm, rs, forcedC);
        }
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => { if (e.touches.length === 2) touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2; }, {passive: true});
        window.addEventListener('touchend', (e) => { if (touchStartY !== 0) { let touchEndY = (e.changedTouches[0].clientY + (e.changedTouches[1] ? e.changedTouches[1].clientY : e.changedTouches[0].clientY)) / 2; if (touchEndY - touchStartY > 70) secretMenu.style.display = 'block'; touchStartY = 0; } });
        saveBtn.addEventListener('click', () => { let val = parseInt(targetInput.value); if (val > 0) { targetSum = val; localStorage.setItem('magicTarget', val); secretMenu.style.display = 'none'; } });
    </script>
</body>
</html>
