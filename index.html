<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 24px 0px 24px; 
            overflow: hidden; 
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(115px + env(safe-area-inset-top));
            margin-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            height: 82px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 330px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 120px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .lap-block-cent { width: 22px; text-align: left; }

        /* STRUTTURA DEL DOCK FLUTTUANTE FEDELE ALLO SCREENSHOT */
        .tab-bar-container {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 12px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 395px;
            height: 84px;
            background-color: #161617;
            border-radius: 42px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            border: 0.5px solid #242426;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 11px;
            font-weight: 400;
            width: 23%;
            height: 100%;
            color: #ffffff;
        }
        .tab-item span {
            color: #ffffff;
            margin-top: 4px;
        }
        .tab-item .tab-svg { 
            width: 32px; 
            height: 32px; 
        }

        /* COMPONENTE INTERNO BOLLA GRIGIA PER EFFETTO RITAGLIO PILLOLA ATTIVA */
        .tab-item .icon-bubble-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 46px;
            border-radius: 23px;
        }

        /* STILE DELLA VOX CRONOMETRO ATTIVA COME DA SCREENSHOT */
        .tab-item.active .icon-bubble-box { 
            background-color: #2c2c2e;
            width: 88px;
        }
        .tab-item.active span { 
            color: var(--tab-active);
            font-weight: 500;
        }

        #secret-menu { 
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #1c1c1e; 
            border: 1px solid #3a3a3c; 
            border-radius: 14px; 
            padding: 20px; 
            width: 280px; 
            z-index: 99999; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        #secret-menu h3 { font-family: -apple-system, sans-serif; color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <!-- DOCK INTERAMENTE DISEGNATO IN VETTORIALE - IMPOSSIBILE CHE APPAIA VUOTO -->
    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali -->
            <div class="tab-item">
                <div class="icon-bubble-box">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="18" r="11" stroke="white" stroke-width="1.5"/>
                        <path d="M18 7V29" stroke="white" stroke-width="1.2"/>
                        <path d="M7 18H29" stroke="white" stroke-width="1.2"/>
                        <path d="M18 7C21.5 10 23 14 23 18C23 22 21.5 26 18 29C14.5 26 13 22 13 18C13 14 14.5 10 18 7Z" stroke="white" stroke-width="1.2"/>
                        <path d="M8.5 13.5H27.5M8.5 22.5H27.5" stroke="white" stroke-width="1.2"/>
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie -->
            <div class="tab-item">
                <div class="icon-bubble-box">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="19.5" r="9" fill="white"/>
                        <path d="M18 15V19.5H22.5" stroke="black" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Campanella sinistra -->
                        <path d="M8 10C7.2 11 7.2 12.5 8 13.5L11.5 10C10.5 9.2 9 9.2 8 10Z" fill="white"/>
                        <!-- Campanella destra -->
                        <path d="M28 10C28.8 11 28.8 12.5 28 13.5L24.5 10C25.5 9.2 27 9.2 28 10Z" fill="white"/>
                        <!-- Piedini sotto -->
                        <rect x="10" y="27" width="2" height="3.5" rx="1" transform="rotate(25 10 27)" fill="white"/>
                        <rect x="24.5" y="26" width="2" height="3.5" rx="1" transform="rotate(-25 24.5 26)" fill="white"/>
                    </svg>
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro (Attivo - Pillola arancione con dettagli neri e tasti meccanici) -->
            <div class="tab-item active">
                <div class="icon-bubble-box">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="19.5" r="9" fill="#ff9f0a"/>
                        <rect x="17.2" y="14" width="1.6" height="6.5" rx="0.8" fill="black"/>
                        <!-- Tasti fisici nativi superiori -->
                        <rect x="16.8" y="7" width="2.4" height="2.5" rx="0.4" fill="#ff9f0a"/>
                        <rect x="24" y="9.5" width="2" height="2.5" rx="0.4" transform="rotate(40 24 9.5)" fill="#ff9f0a"/>
                        <rect x="9.5" y="11" width="2" height="2.5" rx="0.4" transform="rotate(-40 9.5 11)" fill="#ff9f0a"/>
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer -->
            <div class="tab-item">
                <div class="icon-bubble-box">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <path d="M18 10.5C22.9706 10.5 27 14.5294 27 19.5C27 24.4706 22.9706 28.5 18 28.5C13.0294 28.5 9 24.4706 9 19.5C9 15.75 11.3 12.5 14.5 11.2" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M12.5 8.5L15 11L12 13.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M18 19.5L22.5 15.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        });

        btnLeft.addEventListener('click', () => {
            if (isRunning) {
                // Sviluppo Giro
            } else {
                resetTimer();
            }
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }

            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            let m1 = Math.floor(minutes / 10);
            let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10);
            let s2 = seconds % 10;

            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;

            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent;
            let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10);
                let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestCent = c;
                    }
                }
            }

            if (minDiff === 999) return currentMs;

            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
