<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
            --dock-bg: #161617;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 24px 0px 24px; 
            overflow: hidden; 
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(115px + env(safe-area-inset-top));
            margin-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            height: 82px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { background-color: var(--red-btn); color: var(--red-text); } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 330px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 120px; 
        }
        
        /* Struttura della riga bloccata */
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        /* Blocco orizzontale a scomparti rigidi per azzerare i movimenti */
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec {
            width: 44px;
            text-align: right;
        }
        .lap-block-divider {
            width: 8px;
            text-align: center;
        }
        .lap-block-cent {
            width: 22px;
            text-align: left;
        }

        .tab-bar-container {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 12px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 395px;
            height: 68px;
            background-color: var(--dock-bg);
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 4px;
            border: 0.5px solid #242426;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 500;
            width: 25%;
            height: 100%;
            color: #ffffff;
        }
        .tab-item span { opacity: 0.6; }
        .tab-item.active span { color: var(--tab-active); opacity: 1; }
        .tab-img { width: 52px; height: 52px; object-fit: contain; }
        .tab-item.active .tab-img { width: 54px; height: 54px; }

        #secret-menu { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background-color: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 14px; padding: 20px; width: 280px; z-index: 99999; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #secret-menu h3 { font-family: -apple-system, sans-serif; color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <!-- Struttura orizzontale a blocchi rigidi per disattivare le oscillazioni tipografiche -->
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <div class="tab-item">
                <img src="ore_locali.png" class="tab-img" alt="">
                <span>Ore locali</span>
            </div>
            <div class="tab-item">
                <img src="sveglie.png" class="tab-img" alt="">
                <span>Sveglie</span>
            </div>
            <div class="tab-item active">
                <img src="cronometro.png" class="tab-img" alt="">
                <span>Cronometro</span>
            </div>
            <div class="tab-item">
                <img src="timer.png" class="tab-img" alt="">
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Impostazione Forza</h3>
        <input type="number" id="target-number" placeholder="Es. 17" min="1" max="54">
        <br>
        <button id="save-target">Salva</button>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
        const display = document.getElementById('display'), btnLeft = document.getElementById('btnLeft'), btnRight = document.getElementById('btnRight'), secretMenu = document.getElementById('secret-menu'), targetInput = document.getElementById('target-number'), saveBtn = document.getElementById('save-target'), placeholderLap = document.getElementById('lap-row-placeholder'), gestureZone = document.getElementById('gestureZone');
        
        // Elementi dei blocchi rigidi inferiori
        const liveLapMinsec = document.getElementById('live-lap-minsec');
        const liveLapCent = document.getElementById('live-lap-cent');
        
        let targetSum = localStorage.getItem('magicTarget') ? parseInt(localStorage.getItem('magicTarget')) : null;
        if(targetSum) targetInput.value = targetSum;

        function formatTime(m, s, c) { return `${m<10?'0'+m:m}:${s<10?'0'+s:s},${c<10?'0'+c:c}`; }

        function runTimer() { 
            elapsedTime = Date.now() - startTime; 
            let tc = Math.floor(elapsedTime / 10); 
            let m = Math.floor(tc/6000), s = Math.floor(tc/100)%60, c = tc%100;
            
            display.textContent = formatTime(m, s, c);
            
            // Distribuzione esatta del tempo nei tre blocchi fissi
            if(liveLapMinsec && liveLapCent) {
                liveLapMinsec.textContent = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                liveLapCent.textContent = `${c<10?'0'+c:c}`;
            }
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) { 
                startTime = Date.now() - elapsedTime; 
                timerInterval = setInterval(runTimer, 10); 
                isRunning = true; 
                btnRight.textContent = 'Interrompi'; 
                btnRight.className = 'btn btn-stop'; 
                btnLeft.textContent = 'Giro'; 
                btnLeft.className = 'btn btn-lap';
                placeholderLap.classList.add('visible');
            } else { 
                clearInterval(timerInterval); 
                isRunning = false; 
                btnRight.textContent = 'Avvia'; 
                btnRight.className = 'btn btn-start'; 
                btnLeft.textContent = 'Azzera'; 
                if (targetSum !== null) forzareRisultato();
            }
        });

        btnLeft.addEventListener('click', () => { 
            if (!isRunning && btnLeft.textContent === 'Azzera') { 
                elapsedTime = 0; 
                display.textContent = "00:00,00"; 
                if(liveLapMinsec && liveLapCent) {
                    liveLapMinsec.textContent = "00:00";
                    liveLapCent.textContent = "00";
                }
                btnLeft.className = 'btn btn-lap disabled'; 
                placeholderLap.classList.remove('visible'); 
            } 
        });

        function forzareRisultato() {
            let tc = Math.floor(elapsedTime / 10), rs = Math.floor(tc / 100) % 60, rm = Math.floor(tc / 6000);
            let mStr = rm < 10 ? '0' + rm : rm.toString(), sStr = rs < 10 ? '0' + rs : rs.toString();
            let sParziale = mStr.split('').concat(sStr.split('')).reduce((sum, d) => sum + parseInt(d), 0);
            let diff = targetSum - sParziale, forcedC = tc % 100, migliorD = 999;
            for (let c1 = 0; c1 <= 9; c1++) { for (let c2 = 0; c2 <= 9; c2++) { if (c1 + c2 === diff) { let vCent = c1 * 10 + c2; let dist = Math.abs(vCent - (tc % 100)); if (dist < migliorD) { migliorD = dist; forcedC = vCent; } } } }
            
            let tForzato = formatTime(rm, rs, forcedC);
            display.textContent = tForzato;
            
            if(liveLapMinsec && liveLapCent) {
                liveLapMinsec.textContent = `${rm<10?'0'+rm:rm}:${rs<10?'0'+rs:rs}`;
                liveLapCent.textContent = `${forcedC<10?'0'+forcedC:forcedC}`;
            }
        }

        let touchStartY = 0;
        gestureZone.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            } 
        }, {passive: true});

        gestureZone.addEventListener('touchend', (e) => { 
            if (touchStartY !== 0) { 
                let currentY = (e.changedTouches.clientY + (e.changedTouches ? e.changedTouches.clientY : e.changedTouches.clientY)) / 2;
                if (currentY - touchStartY > 45) { 
                    secretMenu.style.display = 'block'; 
                }
                touchStartY = 0; 
            } 
        });

        saveBtn.addEventListener('click', () => { let val = parseInt(targetInput.value); if (val > 0) { targetSum = val; localStorage.setItem('magicTarget', val); secretMenu.style.display = 'none'; } });
    </script>
</body>
</html>
