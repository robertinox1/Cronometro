<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Configurazione Web App nativa per schermo intero assoluto su iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>Cronometro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-text: #aeaeb2;
            --btn-gray-dark: #1c1c1e;
            --btn-gray-dark-text: #b0b0b8;
            --btn-gray-light: #333333;
            --btn-gray-light-text: #f2f2f7;
            --btn-gray-disabled: #545456;
            --btn-green: #1c3d1e;
            --btn-green-text: #4cd964;
            --btn-red: #3a1715;
            --btn-red-text: #ff3b30;
            --border-color: #262629;
            --dot-active: #ffffff;
            --dot-inactive: #3a3a3c;
            --apple-orange: #ff9f0a;
            --tab-gray: #8e8e93;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            position: fixed;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #app-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #000000;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            padding-top: 18vh;
            flex-shrink: 0;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .time-display {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            font-size: 88px;
            font-weight: 100;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .controls-wrapper {
            position: relative;
            margin-top: 86px;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            height: 85px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .btn {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            border: none;
            font-size: 17px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
        }

        .btn:active { filter: brightness(0.65); }
        .btn-lap { background-color: var(--btn-gray-dark); color: var(--btn-gray-dark-text); }
        .btn-lap:disabled { color: var(--btn-gray-disabled); }
        .btn-lap.active-mode { background-color: var(--btn-gray-light); color: var(--btn-gray-light-text); }
        .btn-start { background-color: var(--btn-green); color: var(--btn-green-text); }
        .btn-stop { background-color: var(--btn-red); color: var(--btn-red-text); font-size: 15px; }

        .page-dots {
            display: flex;
            gap: 7px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .dot { width: 7px; height: 7px; border-radius: 50%; background-color: var(--dot-inactive); }
        .dot.active { background-color: var(--dot-active); }

        .laps-container {
            flex: 1;
            overflow-y: auto;
            border-top: 0.5px solid var(--border-color);
            padding: 0 16px;
            margin-bottom: 88px; 
            touch-action: pan-y;
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            border-bottom: 0.5px solid var(--border-color);
            font-size: 17px;
            font-variant-numeric: tabular-nums;
        }

        .lap-row.min { color: var(--btn-green-text); }
        .lap-row.max { color: var(--btn-red-text); }
        .lap-time { color: var(--text-color); font-weight: 300; }

        /* RICOSTRUZIONE NATIVA DELLA BARRA ICONE: Riempie il vuoto e cancella i buchi neri */
        .apple-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px; 
            background-color: #161616;
            border-top: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding-top: 6px;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 20%;
            color: var(--tab-gray);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: -0.1px;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        .nav-item.active {
            color: var(--apple-orange);
        }

        /* Menu Segreto Popup */
        #secret-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .menu-content { background-color: #1c1c1e; padding: 20px; border-radius: 14px; width: 280px; text-align: center; }
        .menu-content h3 { margin-bottom: 15px; font-size: 17px; color: #fff; }
        .menu-content input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #3a3a3c; background-color: #2c2c2e; color: #fff; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; -webkit-user-select: text; }
        .menu-content button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div class="main-content">
            <div class="timer-container">
                <div class="time-display" id="display">00:00,00</div>
            </div>

            <div class="controls-wrapper">
                <div class="controls">
                    <button class="btn btn-lap" id="btn-left" disabled>Giro</button>
                    <button class="btn btn-start" id="btn-right">Avvia</button>
                </div>
                <div class="page-dots">
                    <div class="dot active" id="dot1"></div>
                    <div class="dot" id="dot2"></div>
                </div>
            </div>
        </div>

        <div class="laps-container" id="laps-list"></div>

        <!-- Barra delle icone Apple nativa in codice puro -->
        <div class="apple-navbar">
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 13v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Ore internazionali
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M22 5.72l-4.6-3.86-1.29 1.53 4.6 3.86L22 5.72zM7.88 3.39L6.6 1.86 2 5.71l1.29 1.53 4.59-3.85zM12.5 8H11v6l5.25 3.15.75-1.23-4.5-2.67V8zM12 4c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7z"/></svg>
                Sveglia
            </div>
            <div class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M19.03 7.39l1.42-1.42c-.45-.51-.93-1-1.42-1.42l-1.42 1.42C16.14 4.74 14.17 4 12 4c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10c0-2.17-.74-4.14-1.97-5.61zM13 10h-2v5h2v-5zm-1 12c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zM11 2h2v2h-2V2z"/></svg>
                Cronometro
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M6 2h12v2H6V2zm11.55 10.32c.75-.41 1.22-1.25 1.15-2.17-.11-1.41-1.31-2.52-2.72-2.45-1.12.06-2.03.78-2.38 1.77L12 11h-2v2h2v3.5l1.62 1.62c.78.78 2.05.78 2.83 0l1.1-1.1c.78-.78.78-2.05 0-2.83l-1.5-1.37zM12 4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8B4 8.42 4 12c0-3.86 3.14-7 7-7s7 3.14 7 7-3.14 7-7 7z"/></svg>
                Timer
            </div>
        </div>
    </div>

    <div id="secret-menu">
        <div class="menu-content">
            <h3>Forzatura Cifre</h3>
            <input type="number" id="force-number" placeholder="Es. 15" min="1" max="99">
            <button id="save-btn">Salva</button>
        </div>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, dotInterval = null, liveLapInterval = null;
        let isRunning = false, laps = [], totalLapTime = 0;

        const display = document.getElementById('display'), btnLeft = document.getElementById('btn-left'), btnRight = document.getElementById('btn-right');
        const lapsList = document.getElementById('laps-list'), secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('force-number'), saveBtn = document.getElementById('save-btn');
        const dot1 = document.getElementById('dot1'), dot2 = document.getElementById('dot2');

        let targetSum = localStorage.getItem('magic_force_sum') ? parseInt(localStorage.getItem('magic_force_sum')) : null;
        if(targetSum) forceInput.value = targetSum;

        // RISOLUZIONE SWIPE A DUE DITA SENZA FILTRI INTERFERENTI
        let startY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                startY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && startY !== 0) {
                let currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                if (currentY - startY > 40) {
                    secretMenu.style.display = 'flex';
                    startY = 0;
                }
            }
        }, { passive: true });

        window.addEventListener('touchend', () => { startY = 0; });

        saveBtn.addEventListener('click', () => {
            const val = parseInt(forceInput.value);
            if (!isNaN(val)) { targetSum = val; localStorage.setItem('magic_force_sum', val); } 
            else { targetSum = null; localStorage.removeItem('magic_force_sum'); }
            secretMenu.style.display = 'none';
        });

        function formatTime(ms) {
            let min = Math.floor(ms / 60000), sec = Math.floor((ms % 60000) / 1000), cent = Math.floor((ms % 1000) / 10);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')},${cent.toString().padStart(2, '0')}`;
        }

        function getForcedCentiseconds(currentMs, target) {
            let min = Math.floor(currentMs / 60000), sec = Math.floor((currentMs % 60000) / 1000);
            let baseSum = Math.floor(min / 10) + (min % 10) + Math.floor(sec / 10) + (sec % 10);
            let neededSum = target - baseSum;
            for (let c = 0; c < 100; c++) {
                if ((Math.floor(c / 10) + (c % 10)) === neededSum) return c * 10;
            }
            return null;
        }

        function startDotAnimation() {
            let toggle = true;
            dotInterval = setInterval(() => {
                if (toggle) { dot1.classList.remove('active'); dot2.classList.add('active'); } 
                else { dot2.classList.remove('active'); dot1.classList.add('active'); }
                toggle = !toggle;
            }, 2500);
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => { elapsedTime = Date.now() - startTime; display.innerText = formatTime(elapsedTime); }, 10);
                startDotAnimation();
                btnRight.className = "btn btn-stop"; btnRight.innerText = "Interrompi";
                btnLeft.disabled = false; btnLeft.className = "btn btn-lap active-mode"; btnLeft.innerText = "Giro";
                if (laps.length === 0) laps.unshift({ number: 1, time: 0 });
                renderLaps();
                liveLapInterval = setInterval(() => { if (laps.length > 0 && isRunning) { laps[0].time = elapsedTime - totalLapTime; renderLaps(); } }, 10);
            } else {
                isRunning = false; clearInterval(timerInterval); clearInterval(liveLapInterval); clearInterval(dotInterval);
                dot2.classList.remove('active'); dot1.classList.add('active');
                elapsedTime = Date.now() - startTime;
                if (targetSum !== null) {
                    let forcedMs = getForcedCentiseconds(elapsedTime, targetSum);
                    if (forcedMs !== null) elapsedTime = (Math.floor(elapsedTime / 1000) * 1000) + forcedMs;
                }
                if (laps.length > 0) laps[0].time = elapsedTime - totalLapTime;
                display.innerText = formatTime(elapsedTime);
                btnRight.className = "btn btn-start"; btnRight.innerText = "Avvia";
                btnLeft.className = "btn btn-lap active-mode"; btnLeft.innerText = "Azzera";
            }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) {
                elapsedTime = 0; totalLapTime = 0; laps = []; display.innerText = "00:00,00"; lapsList.innerHTML = "";
                btnLeft.disabled = true; btnLeft.className = "btn btn-lap"; btnLeft.innerText = "Giro";
            } else {
                let currentTotal = elapsedTime; let lapTime = currentTotal - totalLapTime; totalLapTime = currentTotal;
                laps[0].time = lapTime; laps.unshift({ number: laps.length + 1, time: 0 }); renderLaps();
            }
        });

        function renderLaps() {
            lapsList.innerHTML = ""; if (laps.length === 0) return;
            let minIndex = -1, maxIndex = -1;
            if (laps.length > 2) {
                let min = Infinity, max = -Infinity;
                for (let i = (isRunning ? 1 : 0); i < laps.length; i++) {
                    if (laps[i].time < min) { min = laps[i].time; minIndex = i; }
                    if (laps[i].time > max) { max = laps[i].time; maxIndex = i; }
                }
            }
            laps.forEach((lap, index) => {
                const row = document.createElement('div'); row.className = 'lap-row';
                if (index === minIndex && laps.length > 2) row.classList.add('min');
                if (index === maxIndex && laps.length > 2) row.classList.add('max');
                row.innerHTML = `<div class="lap-label">Giro ${lap.number}</div><div class="lap-time">${formatTime(lap.time)}</div>`;
                lapsList.appendChild(row);
            });
        }
    </script>
</body>
</html>
