<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #333333; 
            --gray-text: #ebebf599; 
            --green-btn: #1c3d1e; 
            --green-text: #54d664; 
            --red-btn: #3a1715; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
            --tab-inactive: #8e8e93;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: calc(60px + env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom)) 24px; 
            overflow: hidden; 
        }
        
        /* Display del Tempo */
        .timer-display { 
            font-size: 84px; 
            font-weight: 200; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -1px; 
            width: 100%; 
            text-align: center; 
            margin-bottom: 40px;
        }
        
        /* Layout Pulsanti + Indicatori di Pagina (Pallini) */
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            margin-bottom: 30px;
        }
        .btn { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: none; 
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            outline: none; 
        }
        .btn:active { filter: brightness(1.4); }
        .btn-lap { background-color: var(--gray-btn); color: var(--text-color); }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { background-color: var(--red-btn); color: var(--red-text); font-size: 14px; white-space: nowrap; } 

        /* Pallini Apple centrali */
        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #2c2c2e; }

        /* Contenitore Lista Giri */
        .laps-container { 
            width: 100%; 
            max-width: 340px; 
            border-top: 0.5px solid #222; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 75px; 
        }
        .lap-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 4px;
            border-bottom: 0.5px solid #1c1c1e;
            font-size: 16px;
        }
        .lap-row .lap-label { color: #ffffff; }
        .lap-row .lap-time { font-variant-numeric: tabular-nums; font-weight: 400; }

        /* Barra di Navigazione Inferiore con 4 Voci Bubble */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(65px + env(safe-area-inset-bottom));
            background-color: #161616;
            border-top: 0.5px solid #2c2c2c;
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 999;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--tab-inactive);
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            width: 25%;
        }
        .tab-item.active {
            color: var(--tab-active);
        }
        .tab-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        /* Pannello Trucco Sbloccabile */
        #secret-menu { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background-color: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 14px; padding: 20px; width: 280px; z-index: 99999; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="timer-display" id="display">00:00,00</div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer"></div>

    <!-- Barra Inferiore Apple Replicata -->
    <nav class="tab-bar">
        <div class="tab-item">
            <span class="tab-icon">🌐</span>
            <span>Ore locali</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">⏰</span>
            <span>Sveglia</span>
        </div>
        <div class="tab-item active">
            <span class="tab-icon">⏱️</span>
            <span>Cronometro</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">⏳</span>
            <span>Timer</span>
        </div>
    </nav>

    <!-- Pannello di Configurazione -->
    <div id="secret-menu">
        <h3 style="margin-bottom:15px; font-size:17px;">Impostazione Forza</h3>
        <input type="number" id="target-number" placeholder="Es. 17" min="1" max="54">
        <br>
        <button id="save-target">Salva</button>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
        const display = document.getElementById('display'), btnLeft = document.getElementById('btnLeft'), btnRight = document.getElementById('btnRight'), secretMenu = document.getElementById('secret-menu'), targetInput = document.getElementById('target-number'), saveBtn = document.getElementById('save-target'), lapsContainer = document.getElementById('lapsContainer');
        
        let targetSum = localStorage.getItem('magicTarget') ? parseInt(localStorage.getItem('magicTarget')) : null;
        if(targetSum) targetInput.value = targetSum;

        function formatTime(m, s, c) { return `${m<10?'0'+m:m}:${s<10?'0'+s:s},${c<10?'0'+c:c}`; }

        function runTimer() { 
            elapsedTime = Date.now() - startTime; 
            let tc = Math.floor(elapsedTime / 10); 
            let m = Math.floor(tc/6000), s = Math.floor(tc/100)%60, c = tc%100;
            
            display.textContent = formatTime(m, s, c);
            
            const liveLapTime = document.getElementById('live-lap-time');
            if(liveLapTime) {
                liveLapTime.textContent = formatTime(m, s, c);
            }
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) { 
                startTime = Date.now() - elapsedTime; 
                timerInterval = setInterval(runTimer, 10); 
                isRunning = true; 
                btnRight.textContent = 'Interrompi'; 
                btnRight.className = 'btn btn-stop'; 
                btnLeft.textContent = 'Giro'; 
                btnLeft.className = 'btn btn-lap';
                
                lapsContainer.innerHTML = `
                    <div class="lap-row" id="lap-1-row">
                        <span class="lap-label">Giro 1</span>
                        <span class="lap-time" id="live-lap-time">00:00,00</span>
                    </div>`;
            } else { 
                clearInterval(timerInterval); 
                isRunning = false; 
                btnRight.textContent = 'Avvia'; 
                btnRight.className = 'btn btn-start'; 
                btnLeft.textContent = 'Azzera'; 
                
                if (targetSum !== null) {
                    forzareRisultato();
                }
            }
        });

        btnLeft.addEventListener('click', () => { 
            if (!isRunning && btnLeft.textContent === 'Azzera') { 
                elapsedTime = 0; 
                display.textContent = "00:00,00"; 
                btnLeft.className = 'btn btn-lap disabled'; 
                lapsContainer.innerHTML = ''; 
            } 
        });

        function forzareRisultato() {
            let tc = Math.floor(elapsedTime / 10), rs = Math.floor(tc / 100) % 60, rm = Math.floor(tc / 6000);
            let mStr = rm < 10 ? '0' + rm : rm.toString(), sStr = rs < 10 ? '0' + rs : rs.toString();
            let sParziale = mStr.split('').concat(sStr.split('')).reduce((sum, d) => sum + parseInt(d), 0);
            let diff = targetSum - sParziale, forcedC = tc % 100, migliorD = 999;
            
            for (let c1 = 0; c1 <= 9; c1++) { 
                for (let c2 = 0; c2 <= 9; c2++) { 
                    if (c1 + c2 === diff) { 
                        let vCent = c1 * 10 + c2; 
                        let dist = Math.abs(vCent - (tc % 100)); 
                        if (dist < migliorD) { migliorD = dist; forcedC = vCent; } 
                    } 
                } 
            }
            
            let tForzato = formatTime(rm, rs, forcedC);
            display.textContent = tForzato;
            const liveLapTime = document.getElementById('live-lap-time');
            if(liveLapTime) liveLapTime.textContent = tForzato;
        }

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => { if (e.touches.length === 2) touchStartY = (e.touches.clientY + e.touches.clientY) / 2; }, {passive: true});
        window.addEventListener('touchend', (e) => { if (touchStartY !== 0) { let touchEndY = (e.changedTouches.clientY + (e.changedTouches ? e.changedTouches.clientY : e.changedTouches.clientY)) / 2; if (touchEndY - touchStartY > 70) secretMenu.style.display = 'block'; touchStartY = 0; } });
        saveBtn.addEventListener('click', () => { let val = parseInt(targetInput.value); if (val > 0) { targetSum = val; localStorage.setItem('magicTarget', val); secretMenu.style.display = 'none'; } });
    </script>
</body>
</html>
