<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronometro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-text: #8e8e93;
            --btn-gray: #333333;
            --btn-gray-text: #ffffff;
            --btn-green: #1c3d1e;
            --btn-green-text: #4cd964;
            --btn-red: #3a1715;
            --btn-red-text: #ff3b30;
            --border-color: #262629;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .timer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: 40px;
        }

        .time-display {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            font-size: 84px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            white-space: nowrap;
        }

        .time-display span {
            font-size: 84px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            transition: filter 0.1s;
        }

        .btn:active {
            filter: brightness(0.7);
        }

        .btn-inner {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            border: 2px solid var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-lap {
            background-color: var(--btn-gray);
            color: var(--btn-gray-text);
        }

        .btn-start {
            background-color: var(--btn-green);
            color: var(--btn-green-text);
        }

        .btn-stop {
            background-color: var(--btn-red);
            color: var(--btn-red-text);
        }

        .laps-container {
            flex: 1;
            overflow-y: auto;
            border-top: 0.5px solid var(--border-color);
            padding: 0 30px;
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            border-bottom: 0.5px solid var(--border-color);
            font-size: 17px;
            font-variant-numeric: tabular-nums;
        }

        .lap-row.min {
            color: var(--btn-green-text);
        }

        .lap-row.max {
            color: var(--btn-red-text);
        }

        .lap-label {
            color: var(--text-color);
        }

        .lap-time {
            color: var(--text-color);
        }

        /* Menu Segreto */
        #secret-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .menu-content {
            background-color: #1c1c1e;
            padding: 20px;
            border-radius: 14px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .menu-content h3 {
            margin-bottom: 15px;
            font-size: 17px;
            color: #fff;
        }

        .menu-content input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3a3a3c;
            background-color: #2c2c2e;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        .menu-content button {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="time-display" id="display">00:00,00</div>
    </div>

    <div class="controls">
        <button class="btn btn-lap" id="btn-left" disabled>
            <div class="btn-inner" id="btn-left-text">Giro</div>
        </button>
        <button class="btn btn-start" id="btn-right">
            <div class="btn-inner" id="btn-right-text">Avvia</div>
        </button>
    </div>

    <div class="laps-container" id="laps-list"></div>

    <!-- Menu Segreto Alternativo -->
    <div id="secret-menu">
        <div class="menu-content">
            <h3>Forzatura Cifre</h3>
            <input type="number" id="force-number" placeholder="Es. 15" min="1" max="99">
            <button id="save-btn">Salva</button>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let laps = [];
        let totalLapTime = 0;

        // Elementi DOM
        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnLeftText = document.getElementById('btn-left-text');
        const btnRightText = document.getElementById('btn-right-text');
        const lapsList = document.getElementById('laps-list');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('force-number');
        const saveBtn = document.getElementById('save-btn');

        // Carica numero forzato memorizzato
        let targetSum = localStorage.getItem('magic_force_sum') ? parseInt(localStorage.getItem('magic_force_sum')) : null;
        if(targetSum) forceInput.value = targetSum;

        // Gestione Gestures (Swipe 2 dita verso il basso)
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            // Verifica se lo swipe è verso il basso di almeno 50px
            let touchEndY = (e.changedTouches[0].clientY + (e.changedTouches[1] ? e.changedTouches[1].clientY : e.changedTouches[0].clientY)) / 2;
            if (touchEndY - touchStartY > 50) {
                secretMenu.style.display = 'flex';
            }
            touchStartY = 0;
        }, { passive: true });

        // Salva numero forzato
        saveBtn.addEventListener('click', () => {
            const val = parseInt(forceInput.value);
            if (!isNaN(val)) {
                targetSum = val;
                localStorage.setItem('magic_force_sum', val);
            } else {
                targetSum = null;
                localStorage.removeItem('magic_force_sum');
            }
            secretMenu.style.display = 'none';
        });

        // Formattazione Tempo standard Apple (mm:ss,cc)
        function formatTime(ms) {
            let min = Math.floor(ms / 60000);
            let sec = Math.floor((ms % 60000) / 1000);
            let cent = Math.floor((ms % 1000) / 10);

            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')},${cent.toString().padStart(2, '0')}`;
        }

        // Calcolo e manipolazione magica allo Stop
        function getForcedCentiseconds(currentMs, target) {
            let min = Math.floor(currentMs / 60000);
            let sec = Math.floor((currentMs % 60000) / 1000);
            
            // Estrae le singole cifre di minuti e secondi
            let m1 = Math.floor(min / 10);
            let m2 = min % 10;
            let s1 = Math.floor(sec / 10);
            let s2 = sec % 10;
            
            let baseSum = m1 + m2 + s1 + s2;
            let neededSum = target - baseSum;

            // Cerca i primi centesimi validi (da 0 a 99) la cui somma delle 2 cifre dia il valore richiesto
            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10);
                let c2 = c % 10;
                if ((c1 + c2) === neededSum) {
                    return c * 10; // Ritorna in millesimi
                }
            }
            
            // Fail-safe nel caso matematicamente non bastino i centesimi: modifica leggermente i secondi
            return null;
        }

        // Logica Pulsante Destro (Avvia / Interrompi)
        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                // AVVIA
                isRunning = true;
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateDisplay, 10);
                
                btnRight.className = "btn btn-stop";
                btnRightText.innerText = "Interrompi";
                btnLeft.disabled = false;
                btnLeftText.innerText = "Giro";
            } else {
                // INTERROMPI (STOP)
                isRunning = false;
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;

                // Applicazione Trucco di Magia se impostato
                if (targetSum !== null) {
                    let forcedMs = getForcedCentiseconds(elapsedTime, targetSum);
                    if (forcedMs !== null) {
                        let baseTime = Math.floor(elapsedTime / 1000) * 1000;
                        elapsedTime = baseTime + forcedMs;
                    }
                }

                display.innerText = formatTime(elapsedTime);

                btnRight.className = "btn btn-start";
                btnRightText.innerText = "Avvia";
                btnLeftText.innerText = "Azzera";
            }
        });

        // Logica Pulsante Sinistro (Giro / Azzera)
        btnLeft.addEventListener('click', () => {
            if (!isRunning) {
                // AZZERA
                elapsedTime = 0;
                totalLapTime = 0;
                laps = [];
                display.innerText = "00:00,00";
                lapsList.innerHTML = "";
                btnLeft.disabled = true;
                btnLeftText.innerText = "Giro";
            } else {
                // GIRO (LAP)
                let currentTotal = elapsedTime;
                let lapTime = currentTotal - totalLapTime;
                totalLapTime = currentTotal;

                laps.unshift({
                    number: laps.length + 1,
                    time: lapTime
                });

                renderLaps();
            }
        });

        function updateDisplay() {
            elapsedTime = Date.now() - startTime;
            display.innerText = formatTime(elapsedTime);
        }

        function renderLaps() {
            lapsList.innerHTML = "";
            if (laps.length === 0) return;

            // Identifica giro migliore e peggiore (solo se sono più di 2)
            let minIndex = -1, maxIndex = -1;
            if (laps.length > 1) {
                let min = Infinity, max = -Infinity;
                laps.forEach((lap, index) => {
                    if (lap.time < min) { min = lap.time; minIndex = index; }
                    if (lap.time > max) { max = lap.time; maxIndex = index; }
                });
            }

            laps.forEach((lap, index) => {
                const row = document.createElement('div');
                row.className = 'lap-row';
                if (index === minIndex && laps.length > 2) row.classList.add('min');
                if (index === maxIndex && laps.length > 2) row.classList.add('max');

                row.innerHTML = `
                    <div class="lap-label">Giro ${lap.number}</div>
                    <div class="lap-time">${formatTime(lap.time)}</div>
                `;
                lapsList.appendChild(row);
            });
        }
    </script>
</body>
</html>
