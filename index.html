<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 24px 0px 24px; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(115px + env(safe-area-inset-top));
            margin-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            height: 82px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 330px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 120px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .lap-block-cent { width: 22px; text-align: left; }

        /* TAB BAR STRUTTURA FLUTTUANTE GEOMETRICA DEFINITIVA */
        .tab-bar-container {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 375px;
            height: 74px;
            background-color: #121213;
            border-radius: 37px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px;
            border: 0.5px solid #222224;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10.5px;
            font-weight: 400;
            width: 24%;
            height: 100%;
            color: #ffffff;
        }
        .tab-item span {
            color: #ffffff;
            margin-top: 5px;
            letter-spacing: -0.1px;
        }
        .tab-item .tab-svg { 
            width: 26px; 
            height: 26px; 
        }
        .tab-item .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 84px;
            height: 44px;
            border-radius: 22px;
        }

        /* REPLICA PILLOLA GRIGIA INTERNA CRONOMETRO */
        .tab-item.active .icon-wrapper { 
            background-color: #242426;
        }
        .tab-item.active span { 
            color: var(--tab-active);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <!-- DOCK VETTORIALE - IMPOSSIBILE CHE APPAIA VUOTO O STORTO -->
    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 30 30" fill="none" xmlns="w3.org">
                        <circle cx="15" cy="15" r="9.5" stroke="white" stroke-width="1.3"/>
                        <path d="M15 5.5V24.5" stroke="white" stroke-width="1"/>
                        <path d="M5.5 15H24.5" stroke="white" stroke-width="1"/>
                        <path d="M15 5.5C18.2 8.2 19.5 11.5 19.5 15C19.5 18.5 18.2 21.8 15 24.5C11.8 21.8 10.5 18.5 10.5 15C10.5 11.5 11.8 8.2 15 5.5Z" stroke="white" stroke-width="1"/>
                        <path d="M6.5 10.5H23.5M6.5 19.5H23.5" stroke="white" stroke-width="1"/>
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 30 30" fill="white" xmlns="w3.org">
                        <path d="M15 23.5C19.6 23.5 23.5 19.6 23.5 15C23.5 10.4 19.6 6.5 15 6.5C10.4 6.5 6.5 10.4 6.5 15C6.5 19.6 10.4 23.5 15 23.5ZM14.1 11.2C14.1 10.7 14.5 10.3 15 10.3C15.5 10.3 15.9 10.7 15.9 11.2V14.1H18.8C19.3 14.1 19.7 14.5 19.7 15C19.7 15.5 19.3 15.9 18.8 15.9H15C14.5 15.9 14.1 15.5 14.1 15V11.2Z"/>
                        <path d="M6.2 5C5.14543 5 4.25 5.89543 4.25 7C4.25 7.74797 4.65961 8.40034 5.26733 8.74661C5.69664 7.64416 6.36838 6.64771 7.23438 5.81188C6.95383 5.31821 6.42588 5 6.25 5Z"/>
                        <path d="M23.75 5C23.5741 5 23.0462 5.31821 22.7656 5.81188C23.6316 6.64771 24.3034 7.64416 24.7327 8.74661C25.3404 8.40034 25.75 7.74797 25.75 7C25.75 5.89543 24.8546 5 23.75 5Z"/>
                        <path d="M8.5 24C8.5 24.5523 8.05228 25 7.5 25C6.94772 25 6.5 24.5523 6.5 24C6.5 23.1491 6.88506 22.3882 7.49202 21.8752C7.75549 22.6565 8.13289 23.3855 8.5 24Z"/>
                        <path d="M21.5 24C21.8671 23.3855 22.2445 22.6565 22.508 21.8752C23.1149 22.3882 23.5 23.1491 23.5 24C23.5 24.5523 23.0523 25 22.5 25C21.9477 25 21.5 24.5523 21.5 24Z"/>
                    </svg>
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro (Attivo) -->
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 30 30" fill="none" xmlns="w3.org">
                        <circle cx="15" cy="16.5" r="8" fill="#ff9f0a"/>
                        <rect x="14.3" y="11" width="1.4" height="6" rx="0.7" fill="black"/>
                        <rect x="13.8" y="4.5" width="2.4" height="2.5" rx="0.4" fill="#ff9f0a"/>
                        <rect x="20.3" y="7.2" width="1.6" height="2.5" rx="0.4" transform="rotate(40 20.3 7.2)" fill="#ff9f0a"/>
                        <rect x="8.2" y="8.5" width="1.6" height="2.5" rx="0.4" transform="rotate(-40 8.2 8.5)" fill="#ff9f0a"/>
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 30 30" fill="none" xmlns="w3.org">
                        <path d="M15 8.5C19.4 8.5 23 12.1 23 16.5C23 20.9 19.4 24.5 15 24.5C10.6 24.5 7 20.9 7 16.5C7 13.1 9 10.2 11.9 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M10.5 6.5L12.7 9L10 11.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 16.5L19.2 12.8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        // Blocca interamente lo zoom ed elasticità della pagina
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        });

        btnLeft.addEventListener('click', () => {
            if (isRunning) {
                // Logica Giri
            } else {
                resetTimer();
            }
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }

            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            let m1 = Math.floor(minutes / 10);
            let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10);
            let s2 = seconds % 10;

            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;

            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent;
            let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10);
                let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestCent = c;
                    }
                }
            }

            if (minDiff === 999) return currentMs;

            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
