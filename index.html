<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ff9f0a;
            --tab-inactive: #ffffff;
            --dock-bg: #161617;
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding: 0 24px 0px 24px; 
            overflow: hidden; 
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(115px + env(safe-area-inset-top));
            margin-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 88px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            height: 82px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 330px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 120px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .lap-block-cent { width: 22px; text-align: left; }

        /* TAB BAR NUOVA iOS - DESIGN FLUTTUANTE A BOLLA */
        .tab-bar-container {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 32px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 330px; /* Più stretta e compatta */
            height: 60px;
            background-color: rgba(26, 26, 26, 0.85); /* Effetto trasparenza scura bubble */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 9px;
            font-weight: 500;
            width: 22%;
            height: 100%;
            color: var(--tab-inactive);
            opacity: 0.4; /* Icone bianche trasparenti se inattive */
            transition: color 0.2s, opacity 0.2s;
        }
        .tab-item span { 
            margin-top: 3px;
        }
        .tab-item .tab-svg { 
            width: 23px; 
            height: 23px; 
            fill: currentColor; /* Forza l'utilizzo di icone piene */
        }
        /* Stato Attivo - Arancione Apple e opacità totale */
        .tab-item.active { 
            color: var(--tab-active); 
            opacity: 1;
        }

        #secret-menu { 
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #1c1c1e; 
            border: 1px solid #3a3a3c; 
            border-radius: 14px; 
            padding: 20px; 
            width: 280px; 
            z-index: 99999; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        #secret-menu h3 { font-family: -apple-system, sans-serif; color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <!-- NUOVA STRUTTURA BARRA AD ICONE PIENE (SOLID SVG) -->
    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali -->
            <div class="tab-item">
                <svg class="tab-svg" viewBox="0 0 24 24" xmlns="w3.org">
                    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 10.586V7a1 1 0 1 0-2 0v6a1 1 0 0 0 .293.707l3.5 3.5a1 1 0 0 0 1.414-1.414l-3.207-3.207z"/>
                </svg>
                <span>Ore locali</span>
            </div>
            <!-- Sveglie -->
            <div class="tab-item">
                <svg class="tab-svg" viewBox="0 0 24 24" xmlns="w3.org">
                    <path d="M12 4a8 8 0 1 0 8 8 8.009 8.009 0 0 0-8-8zm1 8H8a1 1 0 0 1 0-2h3V6a1 1 0 0 1 2 0v5a1 1 0 0 1-1 1zm-8.8-6.4a1 1 0 1 1 1.414-1.414l-2 2a1 1 0 1 1-1.414 1.414zm17.186-.286a1 1 0 0 1 0 1.414l-2 2a1 1 0 1 1-1.414-1.414l2-2a1 1 0 0 1 1.414 0z"/>
                </svg>
                <span>Sveglie</span>
            </div>
            <!-- Cronometro (Attivo) -->
            <div class="tab-item active">
                <svg class="tab-svg" viewBox="0 0 24 24" xmlns="w3.org">
                    <path d="M12 5a8 8 0 1 0 8 8 8.009 8.009 0 0 0-8-8zm1 8h-4a1 1 0 0 1 0-2h2V7a1 1 0 0 1 2 0v5a1 1 0 0 1-1 1zm2-10V2a1 1 0 0 0-2 0v1a1 1 0 0 0 2 0z"/>
                </svg>
                <span>Cronometro</span>
            </div>
            <!-- Timer -->
            <div class="tab-item">
                <svg class="tab-svg" viewBox="0 0 24 24" xmlns="w3.org">
                    <path d="M12 2a10 10 0 1 0 10 10A10.011 10.011 0 0 0 12 2zm0 14a4 4 0 1 1 4-4 4.005 4.005 0 0 1-4 4z"/>
                </svg>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        });

        btnLeft.addEventListener('click', () => {
            if (isRunning) {
                // Logica dei Giri futura
            } else {
                resetTimer();
            }
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }

            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);

            let m1 = Math.floor(minutes / 10);
            let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10);
            let s2 = seconds % 10;

            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;

            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent;
            let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10);
                let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestCent = c;
                    }
                }
            }

            if (minDiff === 999) return currentMs;

            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
