<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ffb347; 
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(125px + env(safe-area-inset-top));
            margin-bottom: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 90px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 345px;
            height: 82px;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 8px; 
        }
        .dot {
            width: 7.2px;
            height: 7.2px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 335px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: calc(85px + env(safe-area-inset-bottom)); 
            -webkit-overflow-scrolling: touch;
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            height: 45px;
        }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }

        .tab-bar-container {
            position: fixed;
            bottom: 0; 
            left: 0;
            width: 100%;
            padding: 4px 16px calc(12px + env(safe-area-inset-bottom)) 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
            background-color: #000000;
        }
        .tab-bar {
            width: 100%;
            max-width: 366px;
            height: 65px; 
            background-color: #1a1a1c; 
            border-radius: 32.5px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px; 
            border: 0.8px solid rgba(255, 255, 255, 0.15); 
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 400;
            width: 21%; 
            height: 100%;
            position: relative;
            text-align: center;
        }
        .tab-item span {
            color: #ffffff; 
            margin-top: -1px; 
            letter-spacing: -0.1px;
            width: 100%;
            display: block;
        }

        .tab-item .tab-png-icon {
            width: 28px; 
            height: 28px; 
            object-fit: contain;
            display: block;
        }

        .tab-item.active {
            background-color: #3d3d3f; 
            border-radius: 26px; 
            height: calc(100% - 8px); 
            margin: 4px 0; 
            width: 30.5%; 
        }
        .tab-item.active .icon-wrapper {
            background-color: transparent;
        }
        .tab-item.active span { 
            color: var(--tab-active); 
            font-weight: 500;
        }

        #secret-menu { 
            display: none; 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #1c1c1e; 
            border: 1px solid #3a3a3c; 
            border-radius: 14px; 
            padding: 20px; 
            width: 280px; 
            z-index: 99999; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        #secret-menu h3 { font-family: -apple-system, sans-serif; color: white; margin-bottom: 15px; font-size: 17px; }
        #secret-menu input { width: 80%; padding: 10px; background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        #secret-menu button { background-color: #0a84ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer"></div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="18" r="10" stroke="#ffffff" stroke-width="1.4"/> 
                        <path d="M8 18H28" stroke="#ffffff" stroke-width="1.4"/> 
                        <path d="M18 8V28" stroke="#ffffff" stroke-width="1.4"/>
                        <path d="M18 8C21.0 11.2 22.2 14 22.2 18C22.2 22 21.0 24.8 18 28M18 8C15.0 11.2 13.8 14 13.8 18C13.8 22 15.0 24.8 18 28" stroke="#ffffff" stroke-width="1.4"/>
                        <path d="M9.8 12.6C12.4 13.7 15.1 14.1 18 14.1C20.9 14.1 23.6 13.7 26.2 12.6" stroke="#ffffff" stroke-width="1.4"/> 
                        <path d="M9.8 23.4C12.4 22.3 15.1 21.9 18 21.9C20.9 21.9 23.6 22.3 26.2 23.4" stroke="#ffffff" stroke-width="1.4"/> 
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <img src="sveglia.png" class="tab-png-icon" alt="Sveglie">
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro -->
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(1.22);"> 
                        <circle cx="18" cy="19.5" r="8.5" fill="var(--tab-active)" stroke="var(--tab-active)" stroke-width="1.6"/> 
                        <circle cx="18" cy="19.5" r="1.5" fill="#3d3d3f"/>
                        <path d="M18 18.2V14.2" stroke="#3d3d3f" stroke-width="1.6" stroke-linecap="round"/> 
                        <rect x="17.2" y="8.7" width="1.6" height="2.1" rx="0.3" fill="var(--tab-active)"/> 
                        <rect x="25.0" y="10.8" width="1.6" height="2.1" rx="0.3" transform="rotate(52 25.0 10.8)" fill="var(--tab-active)"/> 
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org" style="transform: scale(1.05);">
                        <path d="M18 9.5 A 8.5 8.5 0 1 1 12.0 12.0" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                        <path d="M18 9.5V11.7" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
                        <g transform="translate(18, 18) rotate(-45)">
                            <circle cx="0" cy="0" r="1.8" fill="#ffffff"/>
                            <polygon points="-1.5,0 1.5,0 0.5,-6.6 -0.5,-6.6" fill="#ffffff"/>
                        </g>
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Forzatura Numero</h3>
        <input type="number" id="forceNumber" placeholder="Somma da forzare" min="0" max="99">
        <button id="saveBtn">Salva Configurazione</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;
        
        let laps = [];
        let lastLapTotalTime = 0;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const lapsContainer = document.getElementById('lapsContainer');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = (e.touches.length === 2) ? (e.touches.clientY + e.touches.clientY) / 2 : (e.changedTouches.length > 0 ? e.changedTouches.clientY : 0);
            if (currentY - touchStartY > 70) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') { targetSum = null; localStorage.removeItem('forcedNumber'); } 
            else { targetSum = parseInt(val); localStorage.setItem('forcedNumber', targetSum); }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => { if (!isRunning) { startTimer(); } else { stopTimer(); } });
        btnLeft.addEventListener('click', () => { if (isRunning) { recordLap(); } else { resetTimer(); } });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
            
            // CORREZIONE CRASH: Inserimento sicuro e allineato del primo Giro
            if (laps.length === 0) {
                laps.push({ time: 0, total: 0 });
                renderLaps();
            }
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            
            // CORREZIONE CRASH: Accesso corretto all'indice dell'array per evitare il blocco di Safari
            if (laps.length > 0) {
                laps[0].time = elapsedTime - lastLapTotalTime;
                laps[0].total = elapsedTime;
                renderLaps();
            }
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);
            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
                if (laps.length > 0) {
                    laps[0].time = elapsedTime - lastLapTotalTime;
                    laps[0].total = elapsedTime;
                }
            }
            renderLaps();
            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            lastLapTotalTime = 0;
            laps = [];
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
            lapsContainer.innerHTML = '';
        }

        function recordLap() {
            if (!isRunning) return;
            lastLapTotalTime = elapsedTime;
            laps.unshift({ time: 0, total: elapsedTime });
            renderLaps();
        }

        function renderLaps() {
            lapsContainer.innerHTML = '';
            laps.forEach((item, index) => {
                let lapNum = laps.length - index;
                let row = document.createElement('div');
                row.className = 'lap-row';
                
                let label = document.createElement('span');
                label.className = 'lap-label';
                label.textContent = `Giro ${lapNum}`;
                
                let val = document.createElement('div');
                val.className = 'lap-time-wrapper';
                val.textContent = formatTime(item.time);
                
                row.appendChild(label);
                row.appendChild(val);
                lapsContainer.appendChild(row);
            });
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCent = Math.floor(currentMs / 10);
            let s = Math.floor(totalCent / 100) % 60;
            let m = Math.floor(totalCent / 6000);
            let m1 = Math.floor(m / 10); let m2 = m % 10;
            let s1 = Math.floor(s / 10); let s2 = s % 10;
            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;
            let currentCent = totalCent % 100;
            let bestCent = currentCent; let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10); let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) { minDiff = diff; bestCent = c; }
                }
            }
            if (minDiff === 999) return currentMs;
            return (Math.floor(totalCent / 100) * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
