<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ffb347; 
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(125px + env(safe-area-inset-top));
            margin-bottom: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 90px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 345px;
            height: 82px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 8px; 
        }
        .dot {
            width: 7.2px;
            height: 7.2px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 335px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 136px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .tab-item .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 38px;
            margin-bottom: 0px;
        }
        .tab-svg { 
            width: 38px; 
            height: 38px; 
        }
        .lap-block-cent { width: 22px; text-align: left; }

        .tab-bar-container {
            position: fixed;
            bottom: 34px; 
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        
        .tab-bar {
            width: 100%;
            max-width: 366px;
            height: 65px; 
            background-color: #1a1a1c; 
            border-radius: 32.5px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px; 
            border: 0.8px solid rgba(255, 255, 255, 0.15); 
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 400;
            width: 21%; 
            height: 100%;
            position: relative;
            text-align: center;
        }
        .tab-item span {
            color: #ffffff; 
            margin-top: -1px; 
            letter-spacing: -0.1px;
            width: 100%;
            display: block;
        }

        .tab-item.active {
            background-color: #3d3d3f; 
            border-radius: 26px; 
            height: calc(100% - 8px); 
            margin: 4px 0; 
            width: 30.5%; 
        }
        .tab-item.active .icon-wrapper {
            background-color: transparent;
        }
        .tab-item.active span { 
            color: var(--tab-active); 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="10" stroke="#ffffff" stroke-width="1.4"/> 
                        <path d="M18 10V18H24" stroke="#ffffff" stroke-width="1.4"/>
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="10" stroke="#ffb347" stroke-width="1.4"/> 
                        <path d="M18 12V18L22 20" stroke="#ffb347" stroke-width="1.4"/>
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
        </nav>
    </div>

    <script>
        // --- LOGICA DI CONTROLLO INTERNA DEL CRONOMETRO ---
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;

        // Recupera in modo persistente il numero salvato all'avvio della pagina
        let forcedNumber = null; 
        const savedNumber = localStorage.getItem('magic_forced_number');
        if (savedNumber !== null) {
            forcedNumber = parseInt(savedNumber, 10);
        }

        let touchStartY = 0;

        const displayEl = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            let cents = Math.floor((ms % 1000) / 10);

            let minStr = minutes.toString().padStart(2, '0');
            let secStr = seconds.toString().padStart(2, '0');
            let centStr = cents.toString().padStart(2, '0');

            return `${minStr}:${secStr},${centStr}`;
        }

        function updateDisplay() {
            let now = Date.now();
            let currentElapsed = elapsedTime + (now - startTime);
            displayEl.textContent = formatTime(currentElapsed);
        }

        // --- IL MECCANISMO DI FORZATURA (Allo Stop) ---
        function getForcedCents(minutes, seconds, targetSum) {
            let sumComponents = 0;
            let minStr = minutes.toString().padStart(2, '0');
            let secStr = seconds.toString().padStart(2, '0');
            
            for (let char of (minStr + secStr)) {
                sumComponents += parseInt(char, 10);
            }

            for (let c = 0; c < 100; c++) {
                let cStr = c.toString().padStart(2, '0');
                let cSum = parseInt(cStr.charAt(0), 10) + parseInt(cStr.charAt(1), 10);
                if ((sumComponents + cSum) === targetSum) {
                    return c;
                }
            }
            
            for (let c = 0; c < 100; c++) {
                let cStr = c.toString().padStart(2, '0');
                let cSum = parseInt(cStr.charAt(0), 10) + parseInt(cStr.charAt(1), 10);
                if ((sumComponents + cSum) % 9 === targetSum % 9) {
                    return c;
                }
            }
            return 0;
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                timerInterval = setInterval(updateDisplay, 10);
                
                btnRight.textContent = "Interrompi";
                btnRight.className = "btn btn-stop";
                
                btnLeft.textContent = "Giro";
                btnLeft.className = "btn btn-lap";
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                let finalElapsed = elapsedTime + (Date.now() - startTime);

                if (forcedNumber !== null) {
                    let totalSeconds = Math.floor(finalElapsed / 1000);
                    let minutes = Math.floor(totalSeconds / 60);
                    let seconds = totalSeconds % 60;

                    let forcedCents = getForcedCents(minutes, seconds, forcedNumber);
                    finalElapsed = (minutes * 60 * 1000) + (seconds * 1000) + (forcedCents * 10);
                }

                elapsedTime = finalElapsed;
                displayEl.textContent = formatTime(elapsedTime);

                btnRight.textContent = "Avvia";
                btnRight.className = "btn btn-start";
                
                btnLeft.textContent = "Ripristina";
                btnLeft.className = "btn btn-lap";
            }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning && btnLeft.textContent === "Ripristina") {
                elapsedTime = 0;
                displayEl.textContent = "00:00,00";
                btnLeft.textContent = "Giro";
                btnLeft.className = "btn btn-lap disabled";
                // NOTA: forcedNumber NON viene azzerato qui per rimanere permanente
            }
        });

        // --- RILEVAMENTO DELLO SWIPE CON DUE DITA (MENU SEGRETO PERSISTENTE) ---
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY !== 0) {
                let currentTouches = e.touches.length > 0 ? e.touches : e.changedTouches;
                let touchEndY = touchStartY;
                
                if (currentTouches && currentTouches.length >= 1) {
                    touchEndY = currentTouches[0].clientY;
                }
                
                let swipeDistance = touchEndY - touchStartY;

                if (swipeDistance > 70) {
                    let currentSavedText = forcedNumber !== null ? ` (Attuale: ${forcedNumber})` : " (Nessuno)";
                    let input = prompt(`Menu Segreto${currentSavedText}\nInserisci il nuovo numero da forzare:\n(Lascia vuoto per disattivare il trucco)`);
                    
                    if (input !== null) {
                        if (input.trim() === "") {
                            forcedNumber = null;
                            localStorage.removeItem('magic_forced_number');
                        } else {
                            let num = parseInt(input, 10);
                            if (!isNaN(num)) {
                                forcedNumber = num;
                                localStorage.setItem('magic_forced_number', num);
                            }
                        }
                    }
                }
                touchStartY = 0;
            }
        }, { passive: true });
    </script>
</body>
</html>
