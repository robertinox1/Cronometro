<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronometro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-text: #8e8e93;
            --btn-gray: #333333;
            --btn-gray-text: #ffffff;
            --btn-green: #1c3d1e;
            --btn-green-text: #4cd964;
            --btn-red: #3a1715;
            --btn-red-text: #ff3b30;
            --border-color: #262629;
            --dot-active: #ffffff;
            --dot-inactive: #3a3a3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Area Display Ultra Sottile e Slanciata */
        .timer-container {
            height: 38vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-top: 40px;
        }

        .time-display {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            font-size: 92px;
            font-weight: 100;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            transform: scaleY(1.08);
        }

        /* Indicatori a due pallini (Pagine) */
        .page-dots {
            display: flex;
            gap: 7px;
            margin-top: 25px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: var(--dot-inactive);
            transition: background-color 0.2s ease;
        }

        .dot.active {
            background-color: var(--dot-active);
        }

        /* Bottoni ingranditi e puliti */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            margin-bottom: 15px;
            height: 90px;
            align-items: center;
        }

        .btn {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            border: none;
            font-size: 17px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            transition: filter 0.1s;
        }

        .btn:active {
            filter: brightness(0.65);
        }

        .btn-lap {
            background-color: var(--btn-gray);
            color: var(--btn-gray-text);
        }
        
        .btn-lap:disabled {
            color: #555555;
        }

        .btn-start {
            background-color: var(--btn-green);
            color: var(--btn-green-text);
        }

        .btn-stop {
            background-color: var(--btn-red);
            color: var(--btn-red-text);
        }

        /* Lista dei Giri */
        .laps-container {
            flex: 1;
            overflow-y: auto;
            border-top: 0.5px solid var(--border-color);
            padding: 0 16px;
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            border-bottom: 0.5px solid var(--border-color);
            font-size: 17px;
            font-variant-numeric: tabular-nums;
            font-weight: 400;
        }

        .lap-row.min { color: var(--btn-green-text); }
        .lap-row.max { color: var(--btn-red-text); }
        .lap-label { color: var(--text-color); }
        .lap-time { color: var(--text-color); transform: scaleY(1.03); font-weight: 300; }

        /* Barra delle icone inferiore con estensione .PNG maiuscola */
        .bottom-tabs {
            height: 50px;
            width: 100%;
            background-image: url('tabs.PNG');
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
            border-top: 0.5px solid var(--border-color);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Menu Segreto (Swipe 2 dita) */
        #secret-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .menu-content {
            background-color: #1c1c1e;
            padding: 20px;
            border-radius: 14px;
            width: 280px;
            text-align: center;
        }

        .menu-content h3 { margin-bottom: 15px; font-size: 17px; color: #fff; }
        .menu-content input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3a3a3c;
            background-color: #2c2c2e;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        .menu-content button {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="time-display" id="display">00:00,00</div>
        <div class="page-dots">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-lap" id="btn-left" disabled>Giro</button>
        <button class="btn btn-start" id="btn-right">Avvia</button>
    </div>

    <div class="laps-container" id="laps-list"></div>

    <div class="bottom-tabs"></div>

    <div id="secret-menu">
        <div class="menu-content">
            <h3>Forzatura Cifre</h3>
            <input type="number" id="force-number" placeholder="Es. 15" min="1" max="99">
            <button id="save-btn">Salva</button>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let dotInterval = null;
        let isRunning = false;
        let laps = [];
        let totalLapTime = 0;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const lapsList = document.getElementById('laps-list');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('force-number');
        const saveBtn = document.getElementById('save-btn');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');

        let targetSum = localStorage.getItem('magic_force_sum') ? parseInt(localStorage.getItem('magic_force_sum')) : null;
        if(targetSum) forceInput.value = targetSum;

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let touchEndY = (e.changedTouches.clientY + (e.changedTouches ? e.changedTouches.clientY : e.changedTouches.clientY)) / 2;
            if (touchEndY - touchStartY > 60) {
                secretMenu.style.display = 'flex';
            }
            touchStartY = 0;
        }, { passive: true });

        saveBtn.addEventListener('click', () => {
            const val = parseInt(forceInput.value);
            if (!isNaN(val)) {
                targetSum = val;
                localStorage.setItem('magic_force_sum', val);
            } else {
                targetSum = null;
                localStorage.removeItem('magic_force_sum');
            }
            secretMenu.style.display = 'none';
        });

        function formatTime(ms) {
            let min = Math.floor(ms / 60000);
            let sec = Math.floor((ms % 60000) / 1000);
            let cent = Math.floor((ms % 1000) / 10);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')},${cent.toString().padStart(2, '0')}`;
        }

        function getForcedCentiseconds(currentMs, target) {
            let min = Math.floor(currentMs / 60000);
            let sec = Math.floor((currentMs % 60000) / 1000);
            let m1 = Math.floor(min / 10); let m2 = min % 10;
            let s1 = Math.floor(sec / 10); let s2 = sec % 10;
            
            let baseSum = m1 + m2 + s1 + s2;
            let neededSum = target - baseSum;

            for (let c = 0; c < 100; c++) {
                if ((Math.floor(c / 10) + (c % 10)) === neededSum) {
                    return c * 10;
                }
            }
            return null;
        }

        function startDotAnimation() {
            let toggle = true;
            dotInterval = setInterval(() => {
                if (toggle) {
                    dot1.classList.remove('active');
                    dot2.classList.add('active');
                } else {
                    dot2.classList.remove('active');
                    dot1.classList.add('active');
                }
                toggle = !toggle;
            }, 2500);
        }

        function stopDotAnimation() {
            clearInterval(dotInterval);
            dot2.classList.remove('active');
            dot1.classList.add('active');
        }

        btnRight.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    display.innerText = formatTime(elapsedTime);
                }, 10);
                
                startDotAnimation();

                btnRight.className = "btn btn-stop";
                btnRight.innerText = "Interrompi";
                btnLeft.disabled = false;
                btnLeft.innerText = "Giro";
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                stopDotAnimation();
                elapsedTime = Date.now() - startTime;

                if (targetSum !== null) {
                    let forcedMs = getForcedCentiseconds(elapsedTime, targetSum);
                    if (forcedMs !== null) {
                        let baseTime = Math.floor(elapsedTime / 1000) * 1000;
                        elapsedTime = baseTime + forcedMs;
                    }
                }

                display.innerText = formatTime(elapsedTime);
                btnRight.className = "btn btn-start";
                btnRight.innerText = "Avvia";
                btnLeft.innerText = "Azzera";
            }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) {
                elapsedTime = 0;
                totalLapTime = 0;
                laps = [];
                display.innerText = "00:00,00";
                lapsList.innerHTML = "";
                btnLeft.disabled = true;
                btnLeft.innerText = "Giro";
            } else {
                let currentTotal = elapsedTime;
                let lapTime = currentTotal - totalLapTime;
                totalLapTime = currentTotal;

                laps.unshift({ number: laps.length + 1, time: lapTime });
                renderLaps();
            }
        });

        function renderLaps() {
            lapsList.innerHTML = "";
            if (laps.length === 0) return;

            let minIndex = -1, maxIndex = -1;
            if (laps.length > 1) {
                let min = Infinity, max = -Infinity;
                laps.forEach((lap, index) => {
                    if (lap.time < min) { min = lap.time; minIndex = index; }
                    if (lap.time > max) { max = lap.time; maxIndex = index; }
                });
            }

            laps.forEach((lap, index) => {
                const row = document.createElement('div');
                row.className = 'lap-row';
                if (index === minIndex && laps.length > 2) row.classList.add('min');
                if (index === maxIndex && laps.length > 2) row.classList.add('max');

                row.innerHTML = `
                    <div class="lap-label">Giro ${lap.number}</div>
                    <div class="lap-time">${formatTime(lap.time)}</div>
                `;
                lapsList.appendChild(row);
            });
        }
    </script>
</body>
</html>
