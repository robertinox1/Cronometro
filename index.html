<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cronometro</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --gray-btn: #1c1c1e; 
            --gray-text: #545456; 
            --green-btn: #0a2e12; 
            --green-text: #2fbc4b; 
            --red-btn: #32100f; 
            --red-text: #ff453a; 
            --tab-active: #ffb347; /* Arancione più chiaro di sistema */
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            margin: 0; 
            padding: 0; 
        }
        html, body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .display-container {
            width: 100%;
            height: 110px;
            margin-top: calc(125px + env(safe-area-inset-top));
            margin-bottom: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .timer-display { 
            font-family: -apple-system-headline, "SF Pro Display", -apple-system, sans-serif;
            font-size: 90px; 
            font-weight: 100; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px; 
            width: 100%; 
            text-align: center; 
            line-height: 110px;
        }
        
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 345px;
            height: 82px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }
        .btn { 
            width: 82px; 
            height: 82px; 
            border-radius: 50%; 
            border: none; 
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px; 
            font-weight: 400;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
            background-color: var(--gray-btn);
            color: #ffffff;
            transition: background-color 0.1s, color 0.1s;
        }
        .btn-lap { color: #ffffff; }
        .btn-lap.disabled { color: var(--gray-text); }
        .btn-start { background-color: var(--green-btn); color: var(--green-text); }
        .btn-stop { 
            background-color: var(--red-btn); 
            color: var(--red-text); 
            font-size: 15px; 
        } 

        .page-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .dot.active { background-color: #ffffff; }
        .dot.inactive { background-color: #48484a; }

        .laps-container { 
            width: 100%; 
            max-width: 335px; 
            border-top: 0.3px solid #2c2c2e; 
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 136px; 
        }
        
        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 2px;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 16px;
            border-bottom: 0.3px solid #2c2c2e;
            opacity: 0;
            height: 45px;
        }
        .lap-row.visible { opacity: 1; }
        .lap-row .lap-label { color: #ffffff; }
        
        .lap-time-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            color: #ffffff;
        }
        .lap-block-minsec { width: 44px; text-align: right; }
        .lap-block-divider { width: 8px; text-align: center; }
        .lap-block-cent { width: 22px; text-align: left; }

        /* TAB BAR SOTTILE - SCHIARITA CON BORDI LUCIDI E ICONE VICINE AI TESTI */
        .tab-bar-container {
            position: fixed;
            bottom: 34px; 
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            z-index: 999;
        }
        .tab-bar {
            width: 100%;
            max-width: 366px;
            height: 60px; /* Barra ulteriormente assottigliata */
            background-color: #1a1a1c; /* Leggermente più chiara dell'originale */
            border-radius: 30px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            border: 0.8px solid rgba(255, 255, 255, 0.15); /* Bordi lucidi d'effetto */
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            font-size: 10px;
            font-weight: 400;
            width: 24%;
            height: 100%;
            position: relative;
        }
        .tab-item span {
            color: #ffffff; 
            margin-top: -1px; /* Icone avvicinate significativamente alle scritte */
            letter-spacing: -0.1px;
        }
        .tab-item .tab-svg { 
            width: 36px; /* Uniformate tutte le icone a una grandezza maggiore coerente */
            height: 36px; 
        }
        .tab-item .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 36px;
            margin-bottom: 0px;
        }

        /* BOLLA DI SELEZIONAMENTO COMPLETA MOLTO PIÙ ALLARGATA AI LATI */
        .tab-item.active {
            background-color: #2c2c2e; /* Grigio di selezione leggermente più chiaro */
            border-radius: 30px; /* Stesso angolo di curvatura della barra principale */
            height: calc(100% - 4px);
            width: 24.5%; /* Allargata lateralmente nell'area di competenza */
        }
        .tab-item.active .icon-wrapper {
            background-color: transparent;
        }
        .tab-item.active span { 
            color: var(--tab-active); 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="display-container" id="gestureZone">
        <div class="timer-display" id="display">00:00,00</div>
    </div>

    <div class="controls-wrapper">
        <button class="btn btn-lap disabled" id="btnLeft">Giro</button>
        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot inactive"></div>
        </div>
        <button class="btn btn-start" id="btnRight">Avvia</button>
    </div>

    <div class="laps-container" id="lapsContainer">
        <div class="lap-row" id="lap-row-placeholder">
            <span class="lap-label">Giro 1</span>
            <div class="lap-time-wrapper">
                <span class="lap-block-minsec" id="live-lap-minsec">00:00</span>
                <span class="lap-block-divider">,</span>
                <span class="lap-block-cent" id="live-lap-cent">00</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="tab-bar">
            <!-- Ore Locali: Linee orizzontali spostate molto più vicine ai poli superiore e inferiore -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="18" r="11.5" stroke="#ffffff" stroke-width="1.8"/> 
                        <path d="M6 18H30" stroke="#ffffff" stroke-width="1.8"/> 
                        <path d="M18 6V30" stroke="#ffffff" stroke-width="1.2"/>
                        <path d="M18 6.5C21.5 10 23 14 23 18C23 22 21.5 26 18 29.5M18 6.5C14.5 10 13 14 13 18C13 22 14.5 26 18 29.5" stroke="#ffffff" stroke-width="1.5"/>
                        <!-- Linee orizzontali spostate stabilmente vicino ai poli -->
                        <path d="M9.5 9.5C12 10.5 15 11 18 11C21 11 24 10.5 26.5 9.5" stroke="#ffffff" stroke-width="1.5"/> <!-- Polo Nord -->
                        <path d="M9.5 26.5C12 25.5 15 25 18 25C21 25 24 25.5 26.5 26.5" stroke="#ffffff" stroke-width="1.5"/> <!-- Polo Sud -->
                    </svg>
                </div>
                <span>Ore locali</span>
            </div>
            
            <!-- Sveglie: Grande come le altre, campanelli più grandi e ravvicinati, interamente bianca tranne lancette ore 9 -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="18.5" r="8.5" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
                        <!-- Lancette scure interne: ore 9 spaccate -->
                        <path d="M18 18.5H13.5M18 18.5V14" stroke="#1a1a1c" stroke-width="1.6" stroke-linecap="round"/> 
                        <!-- Campanelli più grandi e ravvicinati verso l'asse centrale -->
                        <path d="M9 10C8.3 10.7 8.3 11.9 9 12.6L11.8 9.8C11.1 9.1 9.8 9.1 9 10ZM27 10C27.7 10.7 27.7 11.9 27 12.6L24.2 9.8C24.9 9.1 26.2 9.1 27 10Z" fill="#ffffff"/>
                        <rect x="10.2" y="25" width="1.8" height="3.5" rx="0.5" transform="rotate(22 10.2 25)" fill="#ffffff"/>
                        <rect x="21.8" y="24.3" width="1.8" height="3.5" rx="0.5" transform="rotate(-22 21.8 24.3)" fill="#ffffff"/>
                    </svg>
                </div>
                <span>Sveglie</span>
            </div>
            
            <!-- Cronometro (Attivo): Arancione più chiaro, tasto sopra attaccato e uguale a quello a ore 2, lancetta da centro -->
            <div class="tab-item active">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <circle cx="18" cy="19" r="8.5" fill="var(--tab-active)"/>
                        <circle cx="18" cy="19" r="1.6" fill="black"/>
                        <path d="M18 17.4V13" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Tasto superiore ore 12: identico in grandezza a quello laterale e attaccato saldamente alla cassa -->
                        <rect x="17.2" y="7.7" width="1.6" height="2.8" rx="0.4" fill="var(--tab-active)"/> 
                        <!-- Tasto laterale ore 2: identico a quello superiore -->
                        <rect x="23.3" y="9.2" width="1.6" height="2.8" rx="0.4" transform="rotate(40 23.3 9.2)" fill="var(--tab-active)"/> 
                    </svg>
                </div>
                <span>Cronometro</span>
            </div>
            
            <!-- Timer: Cerchio completo spezzato unicamente tra ore 10 e ore 12, tacca a ore 12, lancetta a punta su ore 10 -->
            <div class="tab-item">
                <div class="icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 36 36" fill="none" xmlns="w3.org">
                        <!-- Cerchio completo interrotto esclusivamente nel varco tra ore 10 e ore 12 -->
                        <path d="M13.2 9.2C14.6 8.4 16.2 8 18 8C23.5 8 28 12.5 28 18C28 23.5 23.5 28 18 28C12.5 28 8 23.5 8 18C8 13.4 11.1 9.5 15.2 8.4" stroke="#ffffff" stroke-width="1.6"/>
                        
                        <!-- Piccola linetta a ore 12 che scende verticalmente verso il centro per qualche millimetro -->
                        <path d="M18 8V11.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
                        
                        <!-- Lancetta che parte da un cerchietto e si chiude a punta netta verso le ore 10 -->
                        <circle cx="18" cy="18" r="1.8" fill="#ffffff"/> <!-- Cerchietto di partenza della lancetta -->
                        <polygon points="17.2,17.4 18.2,18.4 11.1,11.1 11.5,10.2" fill="#ffffff"/> <!-- Profilo rastremato a punta -->
                    </svg>
                </div>
                <span>Timer</span>
            </div>
        </nav>
    </div>

    <div id="secret-menu">
        <h3>Menu Segreto</h3>
        <input type="number" id="forceNumber" placeholder="Numero da forzare" min="0" max="99">
        <button id="saveBtn">Salva</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let targetSum = localStorage.getItem('forcedNumber') ? parseInt(localStorage.getItem('forcedNumber')) : null;

        const display = document.getElementById('display');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const secretMenu = document.getElementById('secret-menu');
        const forceInput = document.getElementById('forceNumber');
        const saveBtn = document.getElementById('saveBtn');

        if(targetSum !== null) forceInput.value = targetSum;

        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartY = (e.touches.clientY + e.touches.clientY) / 2;
            }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (touchStartY === 0) return;
            let currentY = 0;
            if (e.touches.length === 2) {
                currentY = (e.touches.clientY + e.touches.clientY) / 2;
            } else if (e.changedTouches.length > 0) {
                currentY = e.changedTouches.clientY;
            }
            
            if (currentY - touchStartY > 80) { 
                secretMenu.style.display = secretMenu.style.display === 'block' ? 'none' : 'block';
            }
            touchStartY = 0;
        });

        saveBtn.addEventListener('click', () => {
            const val = forceInput.value;
            if (val === '') {
                targetSum = null;
                localStorage.removeItem('forcedNumber');
            } else {
                targetSum = parseInt(val);
                localStorage.setItem('forcedNumber', targetSum);
            }
            secretMenu.style.display = 'none';
        });

        btnRight.addEventListener('click', () => {
            if (!isRunning) { startTimer(); } else { stopTimer(); }
        });

        btnLeft.addEventListener('click', () => {
            if (!isRunning) resetTimer();
        });

        function startTimer() {
            isRunning = true;
            startTime = performance.now() - elapsedTime;
            timerInterval = requestAnimationFrame(updateTimer);
            btnRight.textContent = "Interrompi";
            btnRight.className = "btn btn-stop";
            btnLeft.textContent = "Giro";
            btnLeft.classList.remove('disabled');
        }

        function updateTimer() {
            if (!isRunning) return;
            elapsedTime = performance.now() - startTime;
            display.textContent = formatTime(elapsedTime);
            timerInterval = requestAnimationFrame(updateTimer);
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);
            if (targetSum !== null) {
                elapsedTime = forceStopValue(elapsedTime, targetSum);
                display.textContent = formatTime(elapsedTime);
            }
            btnRight.textContent = "Avvia";
            btnRight.className = "btn btn-start";
            btnLeft.textContent = "Azzera";
        }

        function resetTimer() {
            elapsedTime = 0;
            display.textContent = "00:00,00";
            btnLeft.textContent = "Giro";
            btnLeft.classList.add('disabled');
        }

        function formatTime(ms) {
            let totalCentiseconds = Math.floor(ms / 10);
            let centiseconds = totalCentiseconds % 100;
            let totalSeconds = Math.floor(totalCentiseconds / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(centiseconds).padStart(2, '0')}`;
        }

        function forceStopValue(currentMs, target) {
            let totalCentiseconds = Math.floor(currentMs / 10);
            let totalSeconds = Math.floor(currentMs / 100);
            let seconds = totalSeconds % 60;
            let minutes = Math.floor(totalSeconds / 60);
            let m1 = Math.floor(minutes / 10); let m2 = minutes % 10;
            let s1 = Math.floor(seconds / 10); let s2 = seconds % 10;
            let staticSum = m1 + m2 + s1 + s2;
            let neededCentisecondsSum = target - staticSum;
            let currentCent = totalCentiseconds % 100;
            let bestCent = currentCent; let minDiff = 999;

            for (let c = 0; c < 100; c++) {
                let c1 = Math.floor(c / 10); let c2 = c % 10;
                if ((c1 + c2) === neededCentisecondsSum) {
                    let diff = Math.abs(c - currentCent);
                    if (diff < minDiff) { minDiff = diff; bestCent = c; }
                }
            }
            if (minDiff === 999) return currentMs;
            return (totalSeconds * 1000) + (bestCent * 10);
        }
    </script>
</body>
</html>
